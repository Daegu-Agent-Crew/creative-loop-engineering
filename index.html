<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Creative Loop Engine v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap');

:root{
  --bg:#07111f;
  --bg-2:#0d1830;
  --surface:#111c33;
  --surface-2:#182540;
  --surface-3:#223052;
  --border:rgba(148,163,184,.18);
  --border-strong:rgba(129,140,248,.38);
  --text:#eef4ff;
  --text-2:#b8c6df;
  --text-3:#8092b3;
  --accent:#5b7cff;
  --accent-2:#8aa5ff;
  --accent-3:#36d1c4;
  --green:#22c55e;
  --amber:#f59e0b;
  --red:#ef4444;
  --blue:#3b82f6;
  --purple:#a855f7;
  --shadow:0 20px 60px rgba(2,8,23,.35);
  --shadow-soft:0 14px 34px rgba(2,8,23,.22);
  --radius:24px;
  --radius-md:18px;
  --radius-sm:14px;
  --transition:.26s ease;
  --nav-h:72px;
  --tabbar-h:84px;
  --font-display:'Space Grotesk','Inter',sans-serif;
  --font-body:'Inter','Noto Sans KR',system-ui,sans-serif;
  color-scheme:dark;
}

body[data-theme="light"]{
  --bg:#f3f7ff;
  --bg-2:#ffffff;
  --surface:#ffffff;
  --surface-2:#edf3ff;
  --surface-3:#dfe9ff;
  --border:rgba(71,85,105,.14);
  --border-strong:rgba(91,124,255,.34);
  --text:#162236;
  --text-2:#50617f;
  --text-3:#74839e;
  --shadow:0 20px 50px rgba(71,85,105,.16);
  --shadow-soft:0 10px 24px rgba(71,85,105,.12);
  color-scheme:light;
}

.dark,
body.dark{
  color-scheme:dark;
}

@media (prefers-color-scheme:light){
  body:not(.dark):not([data-theme="dark"]):not([data-theme="light"]){
    --bg:#f3f7ff;
    --bg-2:#ffffff;
    --surface:#ffffff;
    --surface-2:#edf3ff;
    --surface-3:#dfe9ff;
    --border:rgba(71,85,105,.14);
    --border-strong:rgba(91,124,255,.34);
    --text:#162236;
    --text-2:#50617f;
    --text-3:#74839e;
    --shadow:0 20px 50px rgba(71,85,105,.16);
    --shadow-soft:0 10px 24px rgba(71,85,105,.12);
    color-scheme:light;
  }
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  color:var(--text);
  background:radial-gradient(circle at top,rgba(91,124,255,.18),transparent 30%),linear-gradient(180deg,var(--bg),var(--bg-2));
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:calc(var(--tabbar-h) + env(safe-area-inset-bottom));
  line-height:1.55;
  letter-spacing:-.01em;
  text-rendering:optimizeLegibility;
  transition:background .35s ease,color .35s ease;
}
a{color:inherit;text-decoration:none}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
h1,h2,h3,h4,h5,h6{
  font-family:var(--font-display);
  line-height:1.08;
  letter-spacing:-.035em;
}
p,li,.panel-subtitle,.hero-copy,.mini-text,.feature-card p,.option-desc,.empty-state p,.modal-meta,.settings-value{
  line-height:1.65;
}
small,.empty-copy,.char-count,.project-meta,.gallery-actions,.test-error{
  letter-spacing:0;
}
img{display:block;max-width:100%}

.shell{
  width:min(1180px,calc(100% - 24px));
  margin:0 auto;
  padding:calc(var(--nav-h) + 20px) 0 calc(var(--tabbar-h) + 20px);
}
.page{display:flex;flex-direction:column;gap:24px}
.route-view{opacity:0;transform:translateY(20px) scale(.985);transition:opacity .3s ease,transform .3s ease}
.route-view.ready{opacity:1;transform:translateY(0) scale(1)}
.hidden{display:none !important}
.muted{color:var(--text-3)}
.empty-copy{font-size:.88rem;color:var(--text-3)}

.nav{
  position:fixed;
  inset:0 0 auto 0;
  height:var(--nav-h);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 16px;
  padding-top:env(safe-area-inset-top);
  z-index:50;
  background:rgba(7,17,31,.66);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
body[data-theme="light"] .nav{background:rgba(255,255,255,.74)}
.nav-inner{width:min(1180px,100%);display:flex;align-items:center;gap:16px}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-family:var(--font-display);
  font-weight:700;
  letter-spacing:.02em;
}
.brand-mark{
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-3));
  box-shadow:0 10px 24px rgba(91,124,255,.28);
}
.nav-links{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.nav-link{
  min-height:44px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:0 14px;
  border-radius:999px;
  color:var(--text-3);
  font-size:.86rem;
  font-weight:700;
  transition:all var(--transition);
}
.nav-link:hover{color:var(--text);background:rgba(129,140,248,.08)}
.nav-link.active{color:var(--text);background:linear-gradient(135deg,rgba(91,124,255,.22),rgba(54,209,196,.18));box-shadow:inset 0 0 0 1px rgba(129,140,248,.24),0 8px 20px rgba(91,124,255,.18)}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  width:min(720px,calc(100% - 16px));
  display:flex;
  gap:8px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  border:1px solid rgba(129,140,248,.18);
  border-radius:28px;
  background:linear-gradient(180deg,rgba(19,30,55,.94),rgba(8,15,28,.88));
  backdrop-filter:blur(24px);
  box-shadow:0 18px 48px rgba(2,8,23,.42),inset 0 1px 0 rgba(255,255,255,.05);
  z-index:60;
}
body[data-theme="light"] .bottom-nav{
  background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(243,247,255,.9));
  box-shadow:0 18px 42px rgba(71,85,105,.16),inset 0 1px 0 rgba(255,255,255,.9);
}
.bottom-nav::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  background:linear-gradient(135deg,rgba(129,140,248,.12),transparent 42%,rgba(54,209,196,.08));
}
.bottom-nav-link{
  position:relative;
  flex:1;
  min-height:56px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  border-radius:18px;
  color:var(--text-3);
  font-size:.72rem;
  font-weight:800;
  transition:transform var(--transition),color var(--transition),background var(--transition),box-shadow var(--transition);
}
.bottom-nav-link::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:8px;
  width:28px;
  height:3px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent-3));
  transform:translateX(-50%) scaleX(.35);
  opacity:0;
  transition:transform var(--transition),opacity var(--transition);
}
.bottom-nav-link:hover{
  color:var(--text);
  transform:translateY(-2px);
  background:rgba(129,140,248,.08);
}
.bottom-nav-link.active{
  color:var(--text);
  background:linear-gradient(135deg,rgba(91,124,255,.28),rgba(54,209,196,.18));
  box-shadow:inset 0 0 0 1px rgba(129,140,248,.18),0 14px 26px rgba(2,8,23,.18);
}
.bottom-nav-link.active::after,
.bottom-nav-link:hover::after{
  opacity:1;
  transform:translateX(-50%) scaleX(1);
}
.bottom-nav-link .icon{font-size:1.18rem;line-height:1}

.panel{
  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:var(--shadow-soft);
  transition:border-color var(--transition),transform var(--transition),box-shadow var(--transition),background var(--transition);
}
.panel:hover{
  border-color:var(--border-strong);
  transform:translateY(-3px);
  box-shadow:0 22px 44px rgba(2,8,23,.24);
}
.panel-title{font-size:clamp(1.08rem,1vw + .85rem,1.32rem);font-weight:800;letter-spacing:-.03em}
.panel-subtitle{font-size:.92rem;color:var(--text-3)}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.split{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:24px;align-items:start}
.stack{display:flex;flex-direction:column;gap:14px}
.stack-sm{width:min(100%,420px)}

.btn{
  min-height:46px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:0 18px;
  border-radius:16px;
  border:1px solid transparent;
  font-size:.9rem;
  font-weight:800;
  box-shadow:0 0 0 rgba(0,0,0,0);
  transition:transform .18s ease,background .24s ease,color .24s ease,border-color .24s ease,box-shadow .24s ease,filter .24s ease;
}
.btn:hover{
  transform:translateY(-2px);
  filter:brightness(1.03);
}
.btn:active{
  transform:translateY(0) scale(.97);
  transition-duration:.12s;
}
.btn:focus-visible{
  outline:none;
  box-shadow:0 0 0 4px rgba(129,140,248,.16);
}
.btn:disabled,.btn.disabled{opacity:.5;pointer-events:none;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),#7d95ff);color:#fff;box-shadow:0 14px 28px rgba(91,124,255,.28)}
.btn-primary:hover{box-shadow:0 18px 34px rgba(91,124,255,.34)}
.btn-secondary{background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.24);color:var(--accent-2)}
.btn-secondary:hover{background:rgba(129,140,248,.16);border-color:rgba(129,140,248,.34)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text-2)}
.btn-ghost:hover{background:rgba(129,140,248,.08);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.2);color:#fecaca}
.btn-success{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.22);color:#86efac}
.btn-blue{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.22);color:#93c5fd}
.btn-sm{min-height:38px;padding:0 14px;font-size:.8rem;border-radius:14px}
.btn-pill{border-radius:999px}

.hero{
  position:relative;
  overflow:hidden;
  padding:34px;
}
.hero::before,.hero::after{content:"";position:absolute;border-radius:50%;pointer-events:none}
.hero::before{width:280px;height:280px;top:-120px;right:-80px;background:radial-gradient(circle,rgba(91,124,255,.24),transparent 70%)}
.hero::after{width:220px;height:220px;bottom:-120px;left:-80px;background:radial-gradient(circle,rgba(54,209,196,.2),transparent 70%)}
.hero-layout{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(300px,.85fr);gap:24px;align-items:center;position:relative;z-index:1}
.hero-kicker{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;border:1px solid rgba(129,140,248,.22);background:rgba(129,140,248,.08);color:var(--accent-2);font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.hero-title{font-family:var(--font-display);font-size:clamp(2.2rem,5vw,4.5rem);line-height:.98;letter-spacing:-.055em;margin-bottom:18px}
.hero-title span{background:linear-gradient(135deg,#fff,var(--accent-2),var(--accent-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
body[data-theme="light"] .hero-title span{background:linear-gradient(135deg,#142338,var(--accent),var(--accent-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-copy{max-width:640px;font-size:1.04rem;color:var(--text-2);margin-bottom:22px}
.hero-actions,.toolbar,.filter-bar,.ref-actions,.modal-actions,.settings-actions,.privacy-options,.chips,.search-wrap{display:flex;gap:10px;flex-wrap:wrap}
.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.stat-box{padding:16px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.stat-box strong{display:block;font-size:1.4rem;font-weight:800}
.stat-box span{font-size:.82rem;color:var(--text-3)}
.hero-visual{position:relative;min-height:380px;display:grid;place-items:center}
.orbit{position:absolute;inset:14% 12%;border-radius:50%;border:1px dashed rgba(129,140,248,.3);animation:spin 20s linear infinite}
.orbit::before,.orbit::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-3));box-shadow:0 0 0 10px rgba(91,124,255,.08)}
.orbit::before{top:8%;left:22%}
.orbit::after{right:16%;bottom:16%}
.hero-card{
  width:min(100%,360px);
  padding:24px;
  border-radius:30px;
  border:1px solid rgba(129,140,248,.22);
  background:linear-gradient(160deg,rgba(17,28,51,.95),rgba(24,37,64,.8));
  box-shadow:var(--shadow);
  transform:rotate(-6deg);
}
body[data-theme="light"] .hero-card{background:linear-gradient(160deg,rgba(255,255,255,.96),rgba(237,243,255,.92))}
.hero-card-item{padding:18px;border-radius:22px;background:rgba(255,255,255,.04);border:1px solid rgba(129,140,248,.16)}
.hero-card-item + .hero-card-item{margin-top:14px}
.mini-kicker{font-size:.76rem;color:var(--accent-2);font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.mini-title{font-size:1.04rem;font-weight:800;letter-spacing:-.025em;margin-bottom:6px}
.mini-text{font-size:.9rem;color:var(--text-3)}
.feature-card{padding:18px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-soft);transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition),background var(--transition)}
.feature-card:hover{transform:translateY(-5px);border-color:var(--border-strong);box-shadow:0 24px 50px rgba(2,8,23,.24)}
.feature-icon{width:46px;height:46px;display:grid;place-items:center;border-radius:16px;background:linear-gradient(135deg,rgba(91,124,255,.16),rgba(54,209,196,.18));font-size:1.35rem;margin-bottom:12px}
.feature-card h3{font-size:1rem;font-weight:800;margin-bottom:8px}
.feature-card p{font-size:.88rem;color:var(--text-2)}
.tags{display:flex;flex-wrap:wrap;gap:10px}
.tag{display:inline-flex;align-items:center;min-height:38px;padding:0 14px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:.82rem;font-weight:800;color:var(--text-2)}
.gallery-preview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.gallery-preview-card{
  min-height:148px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:16px;
  border-radius:22px;
  border:1px solid var(--border);
  color:#fff;
  box-shadow:var(--shadow-soft);
  transition:all var(--transition);
}
.gallery-preview-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.gallery-preview-title{font-size:1rem;font-weight:800;max-width:70%}
.gallery-preview-badge{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.18)}
.theme-g1{background:linear-gradient(135deg,#1a1a3e,#4a2c8a)}
.theme-g2{background:linear-gradient(135deg,#0d2a0d,#1a5a2a)}
.theme-g3{background:linear-gradient(135deg,#3a2a1a,#8a5a2a)}
.theme-g4{background:linear-gradient(135deg,#2a1a0d,#5a3a1a)}
.theme-g5{background:linear-gradient(135deg,#1a2a3a,#2a4a6a)}
.theme-g6{background:linear-gradient(135deg,#0d1a2a,#1a3a5a)}
.theme-g7{background:linear-gradient(135deg,#1a0d2a,#3a1a5a)}
.theme-g8{background:linear-gradient(135deg,#0d2a2a,#1a5a5a)}
.theme-g9{background:linear-gradient(135deg,#3a0d0d,#6a1a0d)}
.theme-g10{background:linear-gradient(135deg,#3a2a4a,#6a4a8a)}

.metric-card{padding:18px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-soft);transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition)}
.metric-card:hover{transform:translateY(-3px);border-color:var(--border-strong);box-shadow:0 20px 42px rgba(2,8,23,.22)}
.metric-card strong{display:block;font-size:1.6rem;font-weight:800;letter-spacing:-.04em}
.metric-card span{display:block;margin-top:6px;font-size:.82rem;color:var(--text-3)}

.step-pills{display:flex;flex-wrap:wrap;gap:8px}
.step-pill{display:inline-flex;align-items:center;min-height:38px;padding:0 14px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:.8rem;font-weight:800;color:var(--text-3)}
.step-pill.active{background:linear-gradient(135deg,var(--accent),#7d95ff);color:#fff;border-color:transparent;box-shadow:0 10px 20px rgba(91,124,255,.22)}
.step-pill.done{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.24);color:var(--green)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.option-card{padding:18px 14px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-soft);cursor:pointer;transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition),background var(--transition)}
.option-card:hover{transform:translateY(-5px);border-color:var(--border-strong);box-shadow:0 22px 44px rgba(2,8,23,.22)}
.option-card.selected{border-color:var(--accent-2);background:linear-gradient(180deg,rgba(91,124,255,.14),rgba(17,28,51,0)),var(--surface)}
.option-icon{font-size:1.7rem;margin-bottom:10px}
.option-title{font-size:.96rem;font-weight:800;margin-bottom:6px}
.option-desc{font-size:.82rem;color:var(--text-3)}
.form-section{padding-top:22px;border-top:1px solid var(--border)}
.form-label{display:block;font-size:.9rem;font-weight:800;color:var(--text-2);margin-bottom:10px}
.field, .textarea, .select{
  width:100%;
  padding:12px 14px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
}
.field:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent-2);box-shadow:0 0 0 4px rgba(129,140,248,.12)}
.textarea{min-height:120px;resize:vertical}
.char-count{font-size:.78rem;color:var(--text-3);text-align:right;margin-top:6px}
.ref-grid{display:flex;flex-wrap:wrap;gap:10px}
.ref-thumb{position:relative;width:84px;height:84px;border-radius:18px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-soft)}
.ref-thumb img{width:100%;height:100%;object-fit:cover}
.ref-delete{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:rgba(239,68,68,.9);color:#fff;font-size:.72rem;opacity:0;transition:opacity var(--transition)}
.ref-thumb:hover .ref-delete{opacity:1}
.ref-chip{display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 12px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:.82rem;color:var(--text-2)}
.ref-chip a{color:inherit}
.ref-chip .delete{color:#fca5a5;cursor:pointer;font-weight:800}
.preview-panel{position:sticky;top:calc(var(--nav-h) + 18px);display:flex;flex-direction:column;gap:12px;padding:20px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-soft)}
.preview-tags{display:flex;flex-wrap:wrap;gap:8px}
.preview-tag{display:inline-flex;align-items:center;gap:6px;min-height:34px;padding:0 12px;border-radius:999px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.18);color:var(--accent-2);font-size:.76rem;font-weight:800}
.preview-box{padding:14px 16px;border-radius:18px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:.86rem;white-space:pre-wrap}
.range-row{display:grid;grid-template-columns:72px minmax(0,1fr) auto;align-items:center;gap:14px}

  async loadLiveGallery() {
    try {
      const settings = STORAGE.settings;
      const pat = settings.github_pat;
      const headers = { 'Accept': 'application/vnd.github+json' };
      if (pat) headers['Authorization'] = `Bearer ${pat}`;

      // CLE 이슈 목록 (CLE-DONE 라벨)
      const issuesResp = await fetch(`https://api.github.com/repos/${CLE_GALLERY_REPO}/issues?labels=CLE-DONE&state=closed&per_page=30`, { headers });
      const issues = issuesResp.ok ? await issuesResp.json() : [];

      // assets 폴더 이미지 목록
      const assetsResp = await fetch(`https://api.github.com/repos/${CLE_GALLERY_REPO}/contents/${CLE_GALLERY_ASSET_PATH}`, { headers });
      const assets = assetsResp.ok ? await assetsResp.json() : [];
      const imageFiles = Array.isArray(assets) ? assets.filter(a => a.name.match(/\.(png|jpg|jpeg|webp)$/i)) : [];

      // 이슈 + 이미지 매핑
      LIVE_GALLERY = [];
      for (const issue of issues) {
        const issueNum = issue.number;
        const title = issue.title.replace(/\[CLE-[^\]]+\]\s*/, '').trim();
        let body = {};
        try { body = JSON.parse(issue.body?.match(/\{[\s\S]*\}/)?.[0] || '{}'); } catch(e) {}
        const refImages = body.refs?.images || [];
        const matchedImages = imageFiles.filter(f => f.name.startsWith(`cle${issueNum}`));
        for (const img of matchedImages) {
          const rawUrl = img.download_url || `https://raw.githubusercontent.com/${CLE_GALLERY_REPO}/${CLE_GALLERY_BRANCH}/${CLE_GALLERY_ASSET_PATH}/${img.name}`;
          const version = img.name.match(/-v(\d+)/)?.[1] || '1';
          LIVE_GALLERY.push({
            id: `cle-${issueNum}-${img.name}`,
            title: title || `CLE #${issueNum}`,
            tags: ['CLE', issueNum <= 5 ? '초기' : '최근'],
            likes: issue.reactions?.total_count || 0,
            imageUrl: rawUrl,
            issueUrl: issue.html_url,
            issueNum,
            version,
            refImages,
            isLive: true
          });
        }
      }

      // 매칭 안 된 이미지도 아카이브로 추가
      const matchedNames = new Set(LIVE_GALLERY.map(g => g.id));
      for (const img of imageFiles) {
        if (!matchedNames.has(`cle-${img.name}`)) {
          const rawUrl = img.download_url || `https://raw.githubusercontent.com/${CLE_GALLERY_REPO}/${CLE_GALLERY_BRANCH}/${CLE_GALLERY_ASSET_PATH}/${img.name}`;
          LIVE_GALLERY.push({
            id: `asset-${img.name}`,
            title: img.name.replace(/\.(png|jpg|jpeg|webp)$/i, '').replace(/-/g, ' '),
            tags: ['CLE', '아카이브'],
            likes: 0,
            imageUrl: rawUrl,
            isLive: true
          });
        }
      }

      GALLERY_LOADED = true;
      if (window.location.hash === '#/gallery') this.route();
    } catch (err) {
      console.warn('Live gallery load failed:', err);
    }
  },

  buildNav() {
    const links = [
      { href: '#/', label: '홈', icon: '🏠' },

      { href: '#/settings', label: '설정', icon: '⚙️' }
    ];
    $('#navLinks').innerHTML = links.map(link => `<a class="nav-link" data-nav href="${link.href}">${link.label}</a>`).join('');
    $('#bottomNav').innerHTML = links.map(link => `<a class="bottom-nav-link" data-bnav href="${link.href}"><span class="icon">${link.icon}</span><span>${link.label}</span></a>`).join('');
  },

  applyTheme() {
    const setting = STORAGE.settings.theme || 'system';
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.body.dataset.theme = setting === 'system' ? (dark ? 'dark' : 'light') : setting;
  },

  setTheme(theme) {
    const settings = STORAGE.settings;
    settings.theme = theme;
    STORAGE.settings = settings;
    this.applyTheme();
    this.route();
    toast('테마 변경 완료', 'success');
  },

  route() {
    this.clearPhaseIntervals();
    const hash = window.location.hash.slice(1) || '/';
    this.currentRoute = hash;
    const app = $('#app');
    app.innerHTML = '<div class="route-view" id="routeView"></div>';
    const view = $('#routeView');

    if (hash === '/') view.innerHTML = this.renderLanding();
    else if (hash === '/new' || hash === '/wizard') view.innerHTML = this.renderNewProject();
    else if (hash === '/dashboard') view.innerHTML = this.renderDashboard();
    else if (hash === '/gallery') view.innerHTML = this.renderGallery();
    else if (hash === '/settings') view.innerHTML = this.renderSettings();
    else if (hash === '/requests') view.innerHTML = this.renderRequestPanel();
    else if (hash === '/test') view.innerHTML = this.renderTest();
    else if (hash.startsWith('/project/')) {
      this.currentProjectId = hash.split('/').pop();
      view.innerHTML = this.renderProject();
    } else if (hash.startsWith('/resume/')) {
      this.handleResume(hash.split('/resume/').pop());
      return;
    } else view.innerHTML = this.renderLanding();

    requestAnimationFrame(() => requestAnimationFrame(() => view.classList.add('ready')));
    this.updateNav();
    if (hash === '/' && !STORAGE.settings.tutorial_seen) setTimeout(() => this.openTutorial(), 700);
    if (hash.startsWith('/project/')) this.autoSimulateProject();
  },

  updateNav() {
    $$('[data-nav]').forEach(link => link.classList.toggle('active', link.getAttribute('href') === '#' + this.currentRoute));
    $$('[data-bnav]').forEach(link => link.classList.toggle('active', link.getAttribute('href') === '#' + this.currentRoute));
  },

  clearPhaseIntervals() {
    Object.values(this.phaseIntervals).forEach(clearInterval);
    this.phaseIntervals = {};
  },

  renderNewProject() {
    const steps = ['주제 선택', '화풍 선택', '분위기 선택'];
    const cards = this.wizStep === 0 ? TOPICS : this.wizStep === 1 ? STYLES : MOODS;

    const example = PROMPT_EXAMPLES[Math.floor(Math.random() * PROMPT_EXAMPLES.length)];

            </div>

              ${steps.map((step, i) => `<span class="step-pill${this.wizStep === i ? ' active' : ''}${i < this.wizStep ? ' done' : ''}">${i + 1}/3 ${step}</span>`).join('')}

                  </div>
                `).join('')}

              ${this.wizStep === 0 ? `
                <div class="form-section stack">
                  <label class="form-label">✍️ 또는 자유롭게 입력하세요</label>
                  <textarea class="textarea" id="promptText" maxlength="2000" placeholder="${example}" oninput="App.updatePrompt()">${this.wizData.prompt}</textarea>
                  <div class="char-count"><span id="charCount">${this.wizData.prompt.length}</span>/2000</div>
                  <div class="ref-actions">
                    <button class="btn btn-secondary btn-sm" onclick="App.addImage()">📷 이미지 첨부</button>
                    <button class="btn btn-ghost btn-sm" onclick="App.toggleUrlInput()">🔗 URL 추가</button>
                  </div>
                  <div class="search-wrap${this.showPromptUrlInput ? '' : ' hidden'}" id="urlInputRow">
                    <input class="field" id="urlInput" placeholder="https://example.com/reference">

                  </div>
                  <div class="ref-grid">
                    ${this.wizData.images.map(image => `<div class="ref-thumb"><img src="${image.data}" alt="${image.name}"><div class="ref-delete" onclick="App.removeImage('${image.id}')">✕</div></div>`).join('')}
                    ${this.wizData.urls.map(url => `<div class="ref-chip">🔗 ${url.title} <span class="delete" onclick="App.removeUrl('${url.id}')">✕</span></div>`).join('')}
                  </div>
                </div>
              ` : ''}
              ${this.wizStep === 1 ? `
                <div class="form-section stack">
                  <label class="form-label">🎨 화풍 참고 자료 (선택)</label>
                  <div class="ref-actions">
                    <button class="btn btn-secondary btn-sm" onclick="App.addStyleImage()">📷 이미지 첨부</button>
                    <button class="btn btn-ghost btn-sm" onclick="App.toggleStyleUrlInput()">🔗 URL 추가</button>
                  </div>
                  <div class="search-wrap${this.showStyleUrlInput ? '' : ' hidden'}" id="styleUrlInputRow">
                    <input class="field" id="styleUrlInput" placeholder="https://example.com/style-ref">
                    <button class="btn btn-primary btn-sm" onclick="App.addStyleUrl()">추가</button>
                  </div>
                  <div class="ref-grid">
                    ${this.wizData.styleImages.map(image => `<div class="ref-thumb"><img src="${image.data}" alt="${image.name}"><div class="ref-delete" onclick="App.removeStyleImage('${image.id}')">✕</div></div>`).join('')}
                    ${this.wizData.styleUrls.map(url => `<div class="ref-chip">🔗 ${url.title} <span class="delete" onclick="App.removeStyleUrl('${url.id}')">✕</span></div>`).join('')}
                  </div>
                </div>
              ` : ''}
              ${this.wizStep === 2 ? `
                <div class="preview-panel">
                  <div class="panel-title">📋 생성 프롬프트 프리뷰</div>
                  <div class="preview-tags">${[...this.wizData.topics, ...this.wizData.styles, ...this.wizData.moods].map(id => {
                    const all = [...TOPICS, ...STYLES, ...MOODS];
                    const item = all.find(entry => entry.id === id);
                    return item ? `<span class="preview-tag">${item.icon} ${item.title}</span>` : '';
                  }).join('')}</div>
                  <div class="preview-box">${this.wizData.finalPrompt}</div>
                  <label class="form-label">직접 수정하기</label>
                  <textarea class="textarea" id="finalPromptText" oninput="App.updateFinalPrompt()">${this.wizData.finalPrompt}</textarea>
                  <button class="btn btn-secondary btn-sm" onclick="App.resetFinalPrompt()">🔄 초기화</button>
                </div>
              ` : ''}
              <div class="toolbar">
                ${this.wizStep > 0 ? '<button class="btn btn-secondary" onclick="App.prevStep()">← 이전</button>' : '<span></span>'}
                ${this.wizStep < 2 ? '<button class="btn btn-primary" onclick="App.nextStep()">다음 →</button>' : '<button class="btn btn-primary" onclick="App.createProject()">🚀 생성 시작</button>'}
              </div>
            </div>
            <aside class="preview-panel">

                const item = all.find(entry => entry.id === id);
                return item ? `<span class="preview-tag">${item.icon} ${item.title}</span>` : '';
              }).join('')}</div>
              ${this.wizData.prompt ? `<div class="preview-box">${this.wizData.prompt}</div>` : '<div class="preview-box muted">카드를 고르거나 프롬프트를 입력하세요.</div>'}
              <div class="empty-copy">⏱️ 예상 생성 시간: 약 2분 · 기본 결과물: 4개 후보</div>
              <button class="btn btn-secondary btn-sm" onclick="App.randomSelect()">🎲 AI가 추천해줘</button>
            </aside>
          </div>
        </section>
      </div>
    `;
  },

  buildAutoPrompt() {
    const lookup = [...TOPICS, ...STYLES, ...MOODS];
    const names = list => list.map(id => (lookup.find(item => item.id === id) || {}).title || id).join(', ');
    let text = '';
    if (this.wizData.topics.length) text += `[주제] ${names(this.wizData.topics)}\n`;
    if (this.wizData.styles.length) text += `[화풍] ${names(this.wizData.styles)}\n`;
    if (this.wizData.moods.length) text += `[분위기] ${names(this.wizData.moods)}\n`;
    if (this.wizData.prompt) text += `[사용자 프롬프트] ${this.wizData.prompt}\n`;
    if (this.wizData.images.length) text += `[참고 이미지] ${this.wizData.images.length}장\n`;
    if (this.wizData.urls.length) text += `[참고 URL] ${this.wizData.urls.map(item => item.url).join(', ')}\n`;
    return text.trim() || '선택해주세요';
  },

  updatePrompt() {
    this.wizData.prompt = $('#promptText')?.value || '';
    const counter = $('#charCount');
    if (counter) counter.textContent = this.wizData.prompt.length;
  },

  updateFinalPrompt() {
    this.wizData.finalPrompt = $('#finalPromptText')?.value || '';
  },

  resetFinalPrompt() {
    this.wizData.finalPrompt = this.buildAutoPrompt();
    const field = $('#finalPromptText');
    if (field) field.value = this.wizData.finalPrompt;
  },

  toggleCard(id, step) {
    const key = step === 0 ? 'topics' : step === 1 ? 'styles' : 'moods';
    const list = this.wizData[key];
    const index = list.indexOf(id);
    if (index >= 0) list.splice(index, 1);
    else list.push(id);
    this.route();
  },

  nextStep() { if (this.wizStep < 2) { this.wizStep += 1; this.route(); } },
  prevStep() { if (this.wizStep > 0) { this.wizStep -= 1; this.route(); } },

  randomSelect() {
    const pick = arr => arr[Math.floor(Math.random() * arr.length)].id;
    this.wizData.topics = [pick(TOPICS.filter(item => item.id !== 'custom'))];
    this.wizData.styles = [pick(STYLES)];
    this.wizData.moods = [pick(MOODS)];
    this.route();
    toast('랜덤 조합 선택!', 'info');
  },

  createProject() {
    if (!this.wizData.topics.length && !this.wizData.styles.length && !this.wizData.moods.length && !this.wizData.prompt) {
      toast('카드나 프롬프트를 선택해주세요', 'error');
      return;
    }
    const lookup = [...TOPICS, ...STYLES, ...MOODS];
    const project = {
      id: uid(),
      title: this.wizData.prompt || [...this.wizData.topics, ...this.wizData.styles, ...this.wizData.moods].map(id => (lookup.find(item => item.id === id) || {}).title || id).join(' ') || '새 프로젝트',
      topic_cards: [...this.wizData.topics],
      style_cards: [...this.wizData.styles],
      mood_cards: [...this.wizData.moods],
      prompt_text: this.wizData.prompt,
      final_prompt: this.wizData.finalPrompt || this.buildAutoPrompt(),
      reference_images: [...this.wizData.images],
      reference_urls: [...this.wizData.urls],
      phases: {
        define: { status: 'idle', timestamp: null },
        generate: { status: 'idle', timestamp: null, candidates: [] },
        evaluate: { status: 'idle', timestamp: null },
        refine: { status: 'idle', timestamp: null },
        deliver: { status: 'idle', timestamp: null }
      },
      feedback: { chips: [], rating_direction: 3, rating_quality: 3, comment: '' },
      privacy: 'private',
      created: Date.now(),
      modified: Date.now(),
      recoveryToken: uid()
    };
    const projects = STORAGE.projects;
    projects.unshift(project);
    STORAGE.projects = projects;
    this.wizData = { topics: [], styles: [], moods: [], prompt: '', images: [], urls: [], styleImages: [], styleUrls: [], finalPrompt: '' };
    this.wizStep = 0;
    this.showPromptUrlInput = false;
    this.showStyleUrlInput = false;
    toast('프로젝트 생성!', 'success');
    window.location.hash = '#/project/' + project.id;
  },

  renderDashboard() {
    const projects = STORAGE.projects;
    const filtered = this.filter === 'all'
      ? projects
      : this.filter === 'active'
        ? projects.filter(project => project.phases.generate.status !== 'complete' && project.phases.generate.status !== 'idle')
        : projects.filter(project => project.phases.deliver.status === 'complete');
    const activeCount = projects.filter(project => project.phases.generate.status === 'generating' || project.phases.generate.status === 'complete').length;
    const doneCount = projects.filter(project => project.phases.deliver.status === 'complete').length;
    return `
      <div class="page">
        <section class="grid-4">
          <article class="metric-card"><strong>${projects.length}</strong><span>전체 프로젝트</span></article>
          <article class="metric-card"><strong>${activeCount}</strong><span>진행 중</span></article>
          <article class="metric-card"><strong>${doneCount}</strong><span>완료</span></article>
          <article class="metric-card"><strong>${Math.max(projects.length - doneCount, 0)}</strong><span>피드백 대기</span></article>
        </section>
        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">📊 내 프로젝트</div>
              <div class="panel-subtitle">카드 기반으로 프로젝트 상태를 빠르게 확인합니다.</div>
            </div>
            <a href="#/new" class="btn btn-primary btn-sm">+ 새 프로젝트</a>

  getProject() {

  saveProject(project) {
    const projects = STORAGE.projects;
    const index = projects.findIndex(item => item.id === project.id);
    if (index >= 0) {
      project.modified = Date.now();
      projects[index] = project;
      STORAGE.projects = projects;
    }
  },

    }
    const phaseMarkup = PHASES.map((phase, index) => {
      const state = project.phases[phase.key].status;
      const stateClass = state === 'complete' ? 'complete' : state === 'generating' ? 'active' : state === 'failed' ? 'failed' : '';
      const iconClass = state === 'generating' ? 'spin' : state === 'idle' ? 'pulse' : state === 'complete' ? 'pop' : '';
      const icon = state === 'complete' ? '✅' : state === 'generating' ? '🔄' : state === 'failed' ? '❌' : '⏳';
      const connector = index < PHASES.length - 1 ? `<div class="phase-connector${state === 'complete' ? ' done' : ''}"></div>` : '';
      return `<div class="phase-node ${stateClass}"><div class="phase-icon"><span class="${iconClass}">${icon}</span></div><div class="phase-label">${phase.label}</div></div>${connector}`;
    }).join('');
    const candidates = (project.phases.generate.candidates.length ? project.phases.generate.candidates : [{status:'idle'},{status:'idle'},{status:'idle'},{status:'idle'}]).map((candidate, index) => `<div class="candidate-card c${(index % 4) + 1}"><span>${candidate.status === 'complete' ? '완료' : candidate.status === 'failed' ? '❌ 실패' : '⏳ 대기'}</span></div>`).join('');
    const status = project.phases.generate.status;
    const statusText = status === 'idle' ? '생성 대기 중' : status === 'generating' ? '🔄 생성 중...' : status === 'complete' ? '✅ 생성 완료' : '❌ 생성 실패';
    const promptCopy = (project.final_prompt || project.prompt_text).replace(/`/g, '\\`');
    return `

        <section class="panel">

          <div class="phase-pipeline">${phaseMarkup}</div>
        </section>
        <div class="status-banner ${status}">${statusText}</div>
        <section class="panel">
          <div class="panel-title">🖼️ 후보 결과물</div>
          <div class="candidate-grid">${candidates}</div>
        </section>
        <section class="panel stack">
          <div class="panel-title">🎯 피드백</div>
          <div class="chips">${FEEDBACK_CHIPS.map(chip => `<span class="feedback-chip${project.feedback.chips.includes(chip) ? ' selected' : ''}" onclick="App.toggleChip('${chip.replace(/'/g, "\\'")}')">${chip}</span>`).join('')}</div>
          <div class="range-row"><label>방향성</label><input type="range" min="1" max="5" value="${project.feedback.rating_direction}" oninput="App.setRating('direction', this.value)"><span class="stars">${'★'.repeat(project.feedback.rating_direction)}${'☆'.repeat(5 - project.feedback.rating_direction)}</span></div>
          <div class="range-row"><label>품질</label><input type="range" min="1" max="5" value="${project.feedback.rating_quality}" oninput="App.setRating('quality', this.value)"><span class="stars">${'★'.repeat(project.feedback.rating_quality)}${'☆'.repeat(5 - project.feedback.rating_quality)}</span></div>
          <div class="toolbar">
            <button class="btn btn-primary btn-sm" onclick="App.approveProject()">✅ 승인</button>
            <button class="btn btn-secondary btn-sm" onclick="App.regenerateProject()">🔄 재생성</button>
            <button class="btn btn-ghost btn-sm">✏️ 방향 수정</button>
          </div>
          <textarea class="textarea" placeholder="추가 코멘트 (선택)" oninput="App.setComment(this.value)">${project.feedback.comment || ''}</textarea>
        </section>
        <section class="collapse">
          <div class="collapse-head" onclick="this.nextElementSibling.classList.toggle('open')"><h4>📋 생성 프롬프트 보기</h4><span>▼</span></div>
          <div class="collapse-body">
            <div class="preview-box">${project.final_prompt || project.prompt_text}</div>
            <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText(\`${promptCopy}\`); toast('복사 완료!', 'success')">📋 복사</button>
          </div>
        </section>
        <section class="collapse">
          <div class="collapse-head" onclick="this.nextElementSibling.classList.toggle('open')"><h4>📎 참고 자료</h4><span>▼</span></div>
          <div class="collapse-body">
            ${project.reference_images.length || project.reference_urls.length ? `
              <div class="stack">
                <div class="ref-grid">${project.reference_images.map(image => `<div class="ref-thumb"><img src="${image.data}" alt="${image.name}"></div>`).join('')}</div>
                <div class="ref-grid">${project.reference_urls.map(url => `<div class="ref-chip">🔗 <a href="${url.url}" target="_blank" rel="noreferrer">${url.title}</a></div>`).join('')}</div>
              </div>
            ` : '<p class="empty-copy">참고 자료 없음</p>'}
          </div>
        </section>
        <section class="panel stack">
          <div class="panel-title">🔗 복구 URL</div>
          <div class="preview-box">#/resume/${project.recoveryToken}</div>
          <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText(location.origin + location.pathname + '#/resume/${project.recoveryToken}'); toast('클립보드에 복사!', 'success')">📋 복사</button>

  toggleChip(chip) {
    const project = this.getProject();
    if (!project) return;
    const index = project.feedback.chips.indexOf(chip);
    if (index >= 0) project.feedback.chips.splice(index, 1);
    else project.feedback.chips.push(chip);
    this.saveProject(project);
    this.route();
  },

  setRating(key, value) {
    const project = this.getProject();
    if (!project) return;
    project.feedback[`rating_${key}`] = parseInt(value, 10);
    this.saveProject(project);
  },

  setComment(value) {
    const project = this.getProject();
    if (!project) return;
    project.feedback.comment = value;
    this.saveProject(project);
  },

  setPrivacy(value) {
    const project = this.getProject();
    if (!project) return;
    project.privacy = value;
    this.saveProject(project);
    toast('공개 설정 변경', 'info');
  },

  approveProject() {
    const project = this.getProject();
    if (!project) return;
    project.phases.deliver.status = 'complete';
    this.saveProject(project);
    this.route();
    toast('승인 완료!', 'success');
  },

  regenerateProject() {
    const project = this.getProject();
    if (!project) return;
    project.phases.generate.status = 'generating';
    project.phases.generate.candidates = [];
    this.saveProject(project);
    this.simulatePhases(project.id);
    toast('재생성 시작!', 'info');
  },

  simulatePhases(projectId) {
    this.clearPhaseIntervals();
    const order = ['define','generate','evaluate','refine','deliver'];
    let step = 0;
    this.phaseIntervals.sim = setInterval(() => {
      const projects = STORAGE.projects;
      const project = projects.find(item => item.id === projectId);
      if (!project || step >= order.length) {
        clearInterval(this.phaseIntervals.sim);
        this.route();
        return;
      }
      const key = order[step];
      project.phases[key].status = key === 'generate' ? 'generating' : 'complete';
      project.phases[key].timestamp = Date.now();
      if (key === 'generate') {
        project.phases.generate.candidates = [{status:'complete'},{status:'complete'},{status:'complete'},{status:'idle'}];
        setTimeout(() => {
          const latest = STORAGE.projects;
          const target = latest.find(item => item.id === projectId);
          if (!target) return;
          target.phases.generate.candidates[3].status = 'complete';
          target.phases.generate.status = 'complete';
          STORAGE.projects = latest;
          this.route();
        }, 1800);
      }
      STORAGE.projects = projects;
      step += 1;
      this.route();
    }, 2600);
  },

  autoSimulateProject() {
    const project = this.getProject();
    if (project && project.phases.define.status === 'idle' && project.phases.generate.status === 'idle') {
      this.simulatePhases(project.id);
    }
  },

  async testGitHubPat() {
    const input = $('#patInput');
    const status = $('#patStatus');
    if (!input || !status) return;
    const token = input.value.trim();
    if (!token) {
      status.textContent = 'PAT를 먼저 입력하세요';
      return;
    }
    status.textContent = '테스트 중...';
    try {
      const response = await fetch('https://api.github.com/user', { headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' } });
      if (response.ok) {
        const data = await response.json();
        status.textContent = '✅ ' + data.login;
      } else {
        const error = await response.json();
        status.textContent = '❌ ' + (error.message || '인증 실패').slice(0, 40);
      }
    } catch {
      status.textContent = '❌ 네트워크 오류';
    }
  },

    if (!project) return toast('프로젝트를 찾을 수 없습니다', 'error');
    this.copyRequest(project)
      .then(() => toast('📋 요청 데이터 복사됨! 디스코드에 붙여넣어주세요', 'success'))
      .catch(() => toast('복사 실패', 'error'));
  },

  async createGitHubIssue() {
    const project = this.getProject();
    if (!project) return toast('프로젝트를 찾을 수 없습니다', 'error');
    const pat = STORAGE.settings.github_pat;
    if (!pat) { toast('설정에서 GitHub PAT를 먼저 저장해주세요', 'error'); return; }
    const payload = {
      type: 'CLE-REQUEST',
      id: project.id,
      title: project.title,
      topics: project.topic_cards,
      styles: project.style_cards,
      moods: project.mood_cards,
      prompt: project.final_prompt || project.prompt_text,
      refs: { images: project.reference_images.map(item => item.name), urls: project.reference_urls.map(item => item.url) },
      feedback: project.feedback,
      timestamp: project.modified
    };
    const body = '## 🎨 CLE 요청\n\n' + JSON.stringify(payload, null, 2) + '\n\n---\n**작성자:** ' + (STORAGE.settings.github_user || 'anonymous') + '\n**CLE-ID:** ' + project.id;
    try {
      toast('Issue 생성 중...', 'info');
      const res = await fetch('https://api.github.com/repos/Daegu-Agent-Crew/creative-loop-engineering/issues', {
        method: 'POST',
        headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: '[CLE-' + project.id.slice(0,8) + '] ' + project.title.slice(0, 60),
          body: body,
          labels: ['CLE-PENDING']
        })
      });
      const data = await res.json();
      if (res.ok && data.number) {
        toast('✅ Issue #' + data.number + ' 생성 완료!', 'success');
        window.open(data.html_url, '_blank');
      } else {
        toast('❌ ' + (data.message || '생성 실패').slice(0, 60), 'error');
      }
    } catch (e) {
      toast('❌ 네트워크 오류: ' + e.message.slice(0, 30), 'error');
    }
    await this.copyRequest(project).catch(() => {});
  },

  copyRequest(project) {
    const payload = {
      type: 'CLE-REQUEST',
      id: project.id,
      title: project.title,
      topics: project.topic_cards,
      styles: project.style_cards,
      moods: project.mood_cards,
      prompt: project.final_prompt || project.prompt_text,
      refs: { images: project.reference_images.map(item => item.name), urls: project.reference_urls.map(item => item.url) },
      feedback: project.feedback,
      timestamp: project.modified
    };
    return navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
  },

  initDragDrop() {
    document.body.addEventListener('dragover', event => {
      event.preventDefault();
      $('#dropZone').classList.add('open');
    });
    document.body.addEventListener('dragleave', event => {
      if (event.relatedTarget === null) $('#dropZone').classList.remove('open');
    });
    document.body.addEventListener('drop', event => {
      event.preventDefault();
      $('#dropZone').classList.remove('open');
      if (event.dataTransfer.files.length) this.processFiles(event.dataTransfer.files, 'images');
    });
  },

  processFiles(files, bucket = 'images') {
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      const maxed = bucket === 'images' ? this.wizData.images.length >= 5 : this.wizData.styleImages.length >= 5;
      if (maxed) continue;
      const reader = new FileReader();
      reader.onload = event => {
        const entry = { id: uid(), name: file.name, data: event.target.result, size: file.size };
        if (bucket === 'images') this.wizData.images.push(entry);
        else this.wizData.styleImages.push(entry);
        this.route();
      };
      reader.readAsDataURL(file);
    }
  },

  addImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = () => this.processFiles(input.files, 'images');
    input.click();
  },

  addStyleImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.onchange = () => this.processFiles(input.files, 'styleImages');
    input.click();
  },

  removeImage(id) { this.wizData.images = this.wizData.images.filter(item => item.id !== id); this.route(); },
  removeStyleImage(id) { this.wizData.styleImages = this.wizData.styleImages.filter(item => item.id !== id); this.route(); },
  toggleUrlInput() { this.showPromptUrlInput = !this.showPromptUrlInput; this.route(); },
  toggleStyleUrlInput() { this.showStyleUrlInput = !this.showStyleUrlInput; this.route(); },

  addUrl() {
    const field = $('#urlInput');
    const value = field?.value.trim();
    if (!value || this.wizData.urls.length >= 3) return;
    this.wizData.urls.push({ id: uid(), url: value, title: new URL(value).hostname || value });
    this.showPromptUrlInput = false;
    this.route();
  },

  addStyleUrl() {
    const field = $('#styleUrlInput');
    const value = field?.value.trim();
    if (!value || this.wizData.styleUrls.length >= 3) return;
    this.wizData.styleUrls.push({ id: uid(), url: value, title: new URL(value).hostname || value });
    this.showStyleUrlInput = false;
    this.route();
  },

  removeUrl(id) { this.wizData.urls = this.wizData.urls.filter(item => item.id !== id); this.route(); },
  removeStyleUrl(id) { this.wizData.styleUrls = this.wizData.styleUrls.filter(item => item.id !== id); this.route(); },

  handleResume(token) {
    const project = STORAGE.projects.find(item => item.recoveryToken === token);
    if (project) window.location.hash = '#/project/' + project.id;
    else {
      toast('프로젝트를 찾을 수 없습니다', 'error');
      window.location.hash = '#/';
    }
  },

  openTutorial() {
    const step = TUTORIAL[this.tutorialStep];
    $('#tutorialTitle').textContent = step.title;
    $('#tutorialText').textContent = step.text;
    $('#tutorialDots').innerHTML = TUTORIAL.map((_, index) => `<span class="${index === this.tutorialStep ? 'active' : ''}"></span>`).join('');
    $('#tutorialNext').textContent = this.tutorialStep < TUTORIAL.length - 1 ? '다음' : '시작!';
    $('#tutorialNext').onclick = () => {
      if (this.tutorialStep < TUTORIAL.length - 1) {
        this.tutorialStep += 1;
        this.openTutorial();
      } else this.closeTutorial();
    };
    $('#tutorialOverlay').classList.add('open');
  },

  closeTutorial() {
    $('#tutorialOverlay').classList.remove('open');
    const settings = STORAGE.settings;
    settings.tutorial_seen = true;
    STORAGE.settings = settings;
  },

  renderTest() {
    return `
      <div class="page">
        <section class="panel stack">
          <div class="test-head">
            <h2>🧪 자동 테스트</h2>
            <div class="test-counters"><span class="pass" id="testPass">✅ 0</span><span class="fail" id="testFail">❌ 0</span></div>
            <div class="toolbar"><button class="btn btn-primary btn-sm" onclick="App.runTests()">▶️ 전체 재실행</button></div>
          </div>
        </section>
        <div class="test-list" id="testList"></div>
      </div>
    `;
  },

  async runTests() {
    const tests = [
      { name: '라우팅: 랜딩 페이지 렌더', fn: () => { window.location.hash = '#/'; return !!$('.hero-title'); } },
      { name: '라우팅: 새 프로젝트 위저드 렌더', fn: () => { window.location.hash = '#/new'; return !!$('.step-pill'); } },
      { name: '라우팅: 대시보드 렌더', fn: () => { window.location.hash = '#/dashboard'; return !!$('.project-card, .empty-state'); } },
      { name: '라우팅: 갤러리 렌더', fn: () => { window.location.hash = '#/gallery'; return !!$('.gallery-card, .masonry'); } },
      { name: '라우팅: 설정 렌더', fn: () => { window.location.hash = '#/settings'; return !!$('.settings-row'); } },
      { name: '스토리지: 설정 저장/불러오기', fn: () => { STORAGE.settings = { theme: 'dark', tutorial_seen: true }; return STORAGE.settings.theme === 'dark'; } },
      { name: '위저드: 카드 선택 토글', fn: () => { App.wizData.topics = []; App.toggleCard('sf', 0); return App.wizData.topics.includes('sf'); } },
      { name: '위저드: 프롬프트 생성', fn: () => { App.wizData.prompt = 'test'; return App.buildAutoPrompt().includes('test'); } },
      { name: '갤러리: 검색 동작', fn: () => getGalleryItems().some(item => item.title.includes('SF')) }
    ];
    const list = $('#testList');
    let pass = 0;
    let fail = 0;
    list.innerHTML = '';
    for (const test of tests) {
      try {
        const result = await test.fn();
        if (!result) throw new Error('assertion failed');
        pass += 1;
        list.insertAdjacentHTML('beforeend', `<div class="test-item pass"><span>✅</span><span class="test-name">${test.name}</span></div>`);
      } catch (error) {
        fail += 1;
        list.insertAdjacentHTML('beforeend', `<div class="test-item fail"><span>❌</span><span class="test-name">${test.name}</span><span class="test-error">${error.message || error}</span></div>`);
      }
    }
    $('#testPass').textContent = '✅ ' + pass;
    $('#testFail').textContent = '❌ ' + fail;
    toast(`테스트 완료: ${pass} 통과, ${fail} 실패`, fail ? 'error' : 'success');
  }
};

window.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
