<!-- ===== NEW CSS ===== -->
<style>

/* ============================================================
   [A1] Tab Enhancement - 3탭 명확한 표시
   Replaces existing .navbar-tabs / .nav-tab styles (lines 313-360)
   ============================================================ */

/* Override: navbar-tabs container - remove pill shape, add room for indicator */
.navbar-tabs {
  display: flex;
  align-items: stretch;
  gap: 0;
  background: transparent;
  border-radius: 0;
  padding: 0;
  position: relative;
  height: 100%;
}

/* Override: nav-tab - larger, always show icon+text, no pill background */
.nav-tab {
  padding: 10px 24px;
  border-radius: 0;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-secondary);
  transition: color var(--transition-fast), background var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  position: relative;
  background: transparent;
  border: none;
  cursor: pointer;
  letter-spacing: 0.02em;
}

.nav-tab .tab-icon {
  font-size: 1.15rem;
}

.nav-tab .tab-label {
  /* Always visible - override any mobile hide */
  display: inline !important;
  font-size: 0.95rem;
}

.nav-tab:hover {
  color: var(--text-primary);
  background: rgba(88, 166, 255, 0.06);
}

/* Override: active tab - text glow + bottom border, no filled pill */
.nav-tab.active {
  color: var(--accent-blue);
  background: rgba(88, 166, 255, 0.08);
  box-shadow: none;
}

/* Active tab bottom highlight bar */
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 10%;
  width: 80%;
  height: 3px;
  background: var(--accent-blue);
  border-radius: 3px 3px 0 0;
  box-shadow: 0 0 10px rgba(88, 166, 255, 0.5), 0 0 20px rgba(88, 166, 255, 0.2);
}

/* Animated sliding indicator bar beneath tabs */
.tab-indicator {
  position: absolute;
  bottom: 0;
  height: 3px;
  background: var(--accent-blue);
  border-radius: 3px 3px 0 0;
  box-shadow: 0 0 12px rgba(88, 166, 255, 0.6), 0 0 24px rgba(88, 166, 255, 0.2);
  transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  z-index: 5;
}

/* Mobile: ensure labels stay visible, slightly smaller */
@media (max-width: 600px) {
  .nav-tab {
    padding: 8px 14px;
    font-size: 0.85rem;
    gap: 5px;
  }
  .nav-tab .tab-label {
    display: inline !important;
    font-size: 0.8rem;
  }
  .nav-tab .tab-icon {
    font-size: 1rem;
  }
}

<!-- ===== NEW HTML ADDITIONS ===== -->
<!--
  [A1] Tab Indicator:
  INSERT inside .navbar-tabs (after the last .nav-tab button, before closing </div>):
    <div class="tab-indicator" id="tabIndicator"></div>

  [A4] Ambient Particles Canvas:
  INSERT as first child of .iso-container (line 3953, after <div class="iso-container">):
    <canvas class="ambient-particles-canvas" id="ambientParticles"></canvas>
-->


<!-- ===== NEW/MODIFIED JS ===== -->
<script>

/* ============================================================
   [A1] Tab Indicator - Animated sliding bar
   Call initTabIndicator() after DOMContentLoaded
   ============================================================ */
function initTabIndicator() {
  var tabsContainer = document.querySelector('.navbar-tabs');
  if (!tabsContainer) return;

  // Create indicator element if not present
  var indicator = document.getElementById('tabIndicator');
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.className = 'tab-indicator';
    indicator.id = 'tabIndicator';
    tabsContainer.style.position = 'relative';
    tabsContainer.appendChild(indicator);
  }

  function moveIndicator(tab) {
    if (!tab) return;
    var rect = tab.getBoundingClientRect();
    var parentRect = tabsContainer.getBoundingClientRect();
    indicator.style.left = (rect.left - parentRect.left) + 'px';
    indicator.style.width = rect.width + 'px';
  }

  // Position on active tab
  var activeTab = tabsContainer.querySelector('.nav-tab.active');
  moveIndicator(activeTab);

  // Observe tab clicks to animate
  tabsContainer.querySelectorAll('.nav-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      moveIndicator(this);
    });
  });

  // Reposition on resize
  window.addEventListener('resize', function() {
    var active = tabsContainer.querySelector('.nav-tab.active');
    moveIndicator(active);
  });
}


/* ============================================================
   [A3] Room Transition - Focus/Dim classes
   Wraps existing focusRoom() with focus/dim logic
   ============================================================ */
var _originalFocusRoom = typeof focusRoom === 'function' ? focusRoom : null;

function enhancedFocusRoom(roomName) {
  // Apply dim/focus classes
  var rooms = document.querySelectorAll('.iso-room');
  rooms.forEach(function(room) {
    room.classList.remove('focused', 'dimmed');
    if (room.classList.contains('room-' + roomName)) {
      room.classList.add('focused');
    } else {
      room.classList.add('dimmed');
    }
  });

  // Call original focusRoom for camera transform
  if (_originalFocusRoom) {
    _originalFocusRoom(roomName);
  }
}

function initRoomFocusEnhancement() {
  // Override room tab clicks to use enhanced version
  document.querySelectorAll('.room-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      var room = this.getAttribute('data-room');
      enhancedFocusRoom(room);
    });
  });

  // Double-click iso-container to reset (unfocus all)
  var isoContainer = document.querySelector('.iso-container');
  if (isoContainer) {
    isoContainer.addEventListener('dblclick', function(e) {
      if (e.target === isoContainer || e.target.classList.contains('iso-scene')) {
        document.querySelectorAll('.iso-room').forEach(function(room) {
          room.classList.remove('focused', 'dimmed');
        });
      }
    });
  }
}


/* ============================================================
   [A4] Ambient Particles - Canvas overlay
   Creates 40 subtle floating particles in the iso-container
   ============================================================ */
function initAmbientParticles() {
  var container = document.querySelector('.iso-container');
  if (!container) return;

  // Create canvas if not present
  var canvas = document.getElementById('ambientParticles');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.className = 'ambient-particles-canvas';
    canvas.id = 'ambientParticles';
    container.insertBefore(canvas, container.firstChild);
  }

  var ctx = canvas.getContext('2d');
  var particles = [];
  var PARTICLE_COUNT = 40;

  function resize() {
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Initialize particles
  for (var i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.8 + 0.4,         // 0.4 - 2.2px
      opacity: Math.random() * 0.25 + 0.05,     // 0.05 - 0.30
      dx: (Math.random() - 0.5) * 0.3,          // slow horizontal drift
      dy: (Math.random() - 0.5) * 0.15 - 0.1,   // slight upward bias
      flickerSpeed: Math.random() * 0.02 + 0.005,
      flickerPhase: Math.random() * Math.PI * 2
    });
  }

  var frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      // Move
      p.x += p.dx;
      p.y += p.dy;

      // Wrap around
      if (p.x < -5) p.x = canvas.width + 5;
      if (p.x > canvas.width + 5) p.x = -5;
      if (p.y < -5) p.y = canvas.height + 5;
      if (p.y > canvas.height + 5) p.y = -5;

      // Flicker opacity
      var flicker = Math.sin(frame * p.flickerSpeed + p.flickerPhase) * 0.5 + 0.5;
      var alpha = p.opacity * (0.5 + flicker * 0.5);

      // Draw particle as a soft dot
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200, 210, 225, ' + alpha + ')';
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }

  animate();
}


/* ============================================================
   Initialization - call after DOMContentLoaded
   Insert these calls into the existing init chain
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  // Small delay to ensure existing scripts have initialized
  setTimeout(function() {
    initTabIndicator();
    initRoomFocusEnhancement();
    initAmbientParticles();
  }, 100);
});

</script>
