<!-- ===== HTML MODIFICATIONS ===== -->
<!--
  1. In renderWorkflows(), add data-category attribute to each .wf-card element
  2. Replace the Cron input section in #workflowForm with a cron builder UI
  3. Category filter buttons get count badges dynamically
  4. Timeline blocks get emoji + workflow name tooltip + click handler
  5. Scroll-to-top button already has correct HTML, CSS above fixes positioning
-->

<script>
/* [B1-B5] All JS modifications for Workflows Zone Enhancements */
(function() {
  'use strict';

  // Wait for the main app to initialize, then apply enhancements
  var checkReady = setInterval(function() {
    // Check if the main app's state and functions are available
    if (!document.getElementById('workflowGrid')) return;
    if (!document.getElementById('categoryFilters')) return;
    clearInterval(checkReady);
    setTimeout(applyEnhancements, 500);
  }, 200);

  function applyEnhancements() {
    console.log('[Evolve-B] Applying Workflows Zone Enhancements...');

    enhanceWorkflowRendering();
    enhanceCategoryFilters();
    enhanceTimeline();
    enhanceFormModal();
    enhanceScrollToTop();

    console.log('[Evolve-B] All enhancements applied.');
  }

  // ============================================================
  // [B1] Enhanced Workflow Card Rendering
  // ============================================================

  function enhanceWorkflowRendering() {
    // Monkey-patch: observe the workflow grid for changes and add data-category
    var grid = document.getElementById('workflowGrid');
    if (!grid) return;

    var observer = new MutationObserver(function() {
      var cards = grid.querySelectorAll('.wf-card');
      cards.forEach(function(card) {
        if (card.hasAttribute('data-category')) return;
        // Detect category from badge class
        var badge = card.querySelector('.wf-card-badge');
        if (badge) {
          var classes = badge.className;
          var cats = ['productivity', 'health', 'smart-home', 'finance', 'lifestyle'];
          for (var i = 0; i < cats.length; i++) {
            if (classes.indexOf('cat-' + cats[i]) !== -1) {
              card.setAttribute('data-category', cats[i]);
              break;
            }
          }
        }
      });
    });

    observer.observe(grid, { childList: true, subtree: false });

    // Also apply to existing cards
    setTimeout(function() {
      var cards = grid.querySelectorAll('.wf-card');
      cards.forEach(function(card) {
        var badge = card.querySelector('.wf-card-badge');
        if (badge) {
          var classes = badge.className;
          var cats = ['productivity', 'health', 'smart-home', 'finance', 'lifestyle'];
          for (var i = 0; i < cats.length; i++) {
            if (classes.indexOf('cat-' + cats[i]) !== -1) {
              card.setAttribute('data-category', cats[i]);
              break;
            }
          }
        }
      });
    }, 100);
  }

  // ============================================================
  // [B2] Timeline Enhancement - Real-time line + Click-to-highlight
  // ============================================================

  function enhanceTimeline() {
    // Real-time update: refresh the timeline now-line every 60 seconds
    setInterval(function() {
      updateTimelineNowLine();
    }, 60000);

    // Add click handler for timeline blocks
    var svgWrapper = document.querySelector('.timeline-svg-wrapper');
    if (svgWrapper) {
      // Create tooltip element
      var tooltip = document.createElement('div');
      tooltip.className = 'timeline-tooltip';
      svgWrapper.style.position = 'relative';
      svgWrapper.appendChild(tooltip);

      // Delegate events on SVG
      var svg = document.getElementById('timelineSvg');
      if (svg) {
        svg.addEventListener('mouseover', function(e) {
          var block = e.target.closest('.timeline-block');
          if (!block) return;
          var title = block.querySelector('title');
          if (title) {
            tooltip.textContent = title.textContent;
            tooltip.classList.add('visible');
          }
        });

        svg.addEventListener('mousemove', function(e) {
          var rect = svgWrapper.getBoundingClientRect();
          tooltip.style.left = (e.clientX - rect.left + 10) + 'px';
          tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
        });

        svg.addEventListener('mouseout', function(e) {
          if (e.target.closest('.timeline-block')) {
            tooltip.classList.remove('visible');
          }
        });

        // Click on timeline block -> highlight corresponding card
        svg.addEventListener('click', function(e) {
          var block = e.target.closest('.timeline-block');
          if (!block) return;
          var title = block.querySelector('title');
          if (!title) return;

          // Extract workflow name from title text (format: "Name @ HH:MM")
          var titleText = title.textContent;
          var wfName = titleText.split(' @ ')[0];

          // Find matching card in grid
          var grid = document.getElementById('workflowGrid');
          if (!grid) return;

          // Remove previous highlights
          grid.querySelectorAll('.wf-card.highlighted').forEach(function(c) {
            c.classList.remove('highlighted');
          });

          var cards = grid.querySelectorAll('.wf-card');
          cards.forEach(function(card) {
            var cardTitle = card.querySelector('.wf-card-title');
            if (cardTitle && cardTitle.textContent.trim() === wfName) {
              card.classList.add('highlighted');
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              // Remove highlight after 3 seconds
              setTimeout(function() {
                card.classList.remove('highlighted');
              }, 3000);
            }
          });
        });
      }
    }
  }

  function updateTimelineNowLine() {
    var svg = document.getElementById('timelineSvg');
    if (!svg) return;

    var now = new Date();
    var currentHour = now.getHours() + now.getMinutes() / 60;
    var width = 800;
    var paddingLeft = 40;
    var paddingRight = 10;
    var usableW = width - paddingLeft - paddingRight;
    var nowX = paddingLeft + (currentHour / 24) * usableW;

    // Update existing now-line position
    var nowLine = svg.querySelector('.timeline-now-line');
    if (nowLine) {
      nowLine.setAttribute('x1', nowX);
      nowLine.setAttribute('x2', nowX);
    }

    var nowLabel = svg.querySelector('.timeline-now-label');
    if (nowLabel) {
      nowLabel.setAttribute('x', nowX);
    }
  }

  // ============================================================
  // [B3] Category Filter Enhancement - Counts + Category Colors
  // ============================================================

  function enhanceCategoryFilters() {
    var filtersContainer = document.getElementById('categoryFilters');
    if (!filtersContainer) return;

    function updateFilterCounts() {
      // Read workflows from localStorage or from grid
      var workflows = [];
      try {
        var saved = localStorage.getItem('openclaw-workflows');
        if (saved) workflows = JSON.parse(saved);
      } catch(e) {}

      var counts = { all: workflows.length };
      var categories = ['productivity', 'health', 'smart-home', 'finance', 'lifestyle'];
      categories.forEach(function(cat) {
        counts[cat] = workflows.filter(function(w) { return w.category === cat; }).length;
      });

      var buttons = filtersContainer.querySelectorAll('.category-btn');
      buttons.forEach(function(btn) {
        var cat = btn.getAttribute('data-category');
        var count = counts[cat] || 0;

        // Update or add count span
        var countSpan = btn.querySelector('.cat-count');
        if (!countSpan) {
          countSpan = document.createElement('span');
          countSpan.className = 'cat-count';
          btn.appendChild(countSpan);
        }
        countSpan.textContent = '(' + count + ')';
      });
    }

    // Initial update
    updateFilterCounts();

    // Update counts when workflows change (observe grid mutations)
    var grid = document.getElementById('workflowGrid');
    if (grid) {
      var observer = new MutationObserver(function() {
        updateFilterCounts();
      });
      observer.observe(grid, { childList: true });
    }

    // Also update periodically (in case of toggles/deletes)
    setInterval(updateFilterCounts, 5000);
  }

  // ============================================================
  // [B4] Form Enhancement - Validation + Cron Builder
  // ============================================================

  function enhanceFormModal() {
    var form = document.getElementById('workflowForm');
    if (!form) return;

    // Replace the Cron input with a builder
    var cronGroup = document.getElementById('formCron');
    if (!cronGroup) return;
    var cronParent = cronGroup.closest('.form-group');
    if (!cronParent) return;

    // Hide original cron input (keep it for value storage)
    cronGroup.style.display = 'none';
    var hintEl = cronParent.querySelector('.form-hint');
    if (hintEl) hintEl.style.display = 'none';

    // Build the cron builder UI
    var builder = document.createElement('div');
    builder.className = 'cron-builder';
    builder.innerHTML =
      '<div class="cron-builder-row">' +
        '<span class="cron-builder-label">시간</span>' +
        '<select id="cronHour">' +
          buildOptions(24, '시') +
        '</select>' +
        '<span class="cron-builder-label">분</span>' +
        '<select id="cronMinute">' +
          '<option value="0">00분</option>' +
          '<option value="15">15분</option>' +
          '<option value="30">30분</option>' +
          '<option value="45">45분</option>' +
        '</select>' +
      '</div>' +
      '<div class="cron-builder-row">' +
        '<span class="cron-builder-label">요일</span>' +
        '<div class="cron-day-checks">' +
          buildDayCheckboxes() +
        '</div>' +
      '</div>' +
      '<div class="cron-preview" id="cronPreviewExpr">' +
        '<span class="cron-preview-label">Cron:</span> <span id="cronExprText">0 9 * * *</span>' +
      '</div>' +
      '<div class="cron-readable" id="cronReadable">매일 오전 9:00</div>';

    cronParent.appendChild(builder);

    // Also hide the schedule description input (auto-generate it)
    var schedDescInput = document.getElementById('formScheduleDesc');
    if (schedDescInput) {
      var schedDescGroup = schedDescInput.closest('.form-group');
      if (schedDescGroup) schedDescGroup.style.display = 'none';
    }

    // Event listeners for cron builder
    var cronHour = document.getElementById('cronHour');
    var cronMinute = document.getElementById('cronMinute');

    function updateCronExpression() {
      var h = cronHour ? cronHour.value : '9';
      var m = cronMinute ? cronMinute.value : '0';

      // Collect selected days
      var dayChecks = builder.querySelectorAll('.cron-day-cb:checked');
      var days = [];
      dayChecks.forEach(function(cb) { days.push(cb.value); });

      var dayPart = days.length === 0 || days.length === 7 ? '*' : days.join(',');
      var cronExpr = m + ' ' + h + ' * * ' + dayPart;

      // Update hidden cron input
      cronGroup.value = cronExpr;

      // Update preview
      var exprText = document.getElementById('cronExprText');
      if (exprText) exprText.textContent = cronExpr;

      // Generate human-readable description
      var readable = generateReadableSchedule(parseInt(h), parseInt(m), days);
      var readableEl = document.getElementById('cronReadable');
      if (readableEl) readableEl.textContent = readable;

      // Also update schedule description
      if (schedDescInput) schedDescInput.value = readable;
    }

    if (cronHour) cronHour.addEventListener('change', updateCronExpression);
    if (cronMinute) cronMinute.addEventListener('change', updateCronExpression);
    builder.querySelectorAll('.cron-day-cb').forEach(function(cb) {
      cb.addEventListener('change', updateCronExpression);
    });

    // Initial value
    updateCronExpression();

    // Form validation enhancement
    enhanceFormValidation(form);
  }

  function buildOptions(count, suffix) {
    var html = '';
    for (var i = 0; i < count; i++) {
      var selected = i === 9 ? ' selected' : '';
      html += '<option value="' + i + '"' + selected + '>' + String(i).padStart(2, '0') + suffix + '</option>';
    }
    return html;
  }

  function buildDayCheckboxes() {
    var days = [
      { val: '1', label: '월' },
      { val: '2', label: '화' },
      { val: '3', label: '수' },
      { val: '4', label: '목' },
      { val: '5', label: '금' },
      { val: '6', label: '토' },
      { val: '0', label: '일' }
    ];
    return days.map(function(d) {
      return '<div class="cron-day-check">' +
        '<input type="checkbox" class="cron-day-cb" id="cronDay' + d.val + '" value="' + d.val + '">' +
        '<label for="cronDay' + d.val + '">' + d.label + '</label>' +
      '</div>';
    }).join('');
  }

  function generateReadableSchedule(hour, minute, days) {
    var timeStr = (hour < 12 ? '오전' : '오후') + ' ' +
      (hour === 0 ? 12 : hour > 12 ? hour - 12 : hour) + ':' +
      String(minute).padStart(2, '0');

    var dayNames = { '0': '일', '1': '월', '2': '화', '3': '수', '4': '목', '5': '금', '6': '토' };

    if (days.length === 0 || days.length === 7) {
      return '매일 ' + timeStr;
    }

    // Check if weekdays only (1-5)
    var sorted = days.slice().sort();
    if (sorted.join(',') === '1,2,3,4,5') {
      return '평일 ' + timeStr;
    }
    if (sorted.join(',') === '0,6') {
      return '주말 ' + timeStr;
    }

    var dayLabels = days.map(function(d) { return dayNames[d] || d; });
    return '매주 ' + dayLabels.join(', ') + '요일 ' + timeStr;
  }

  function enhanceFormValidation(form) {
    var saveBtn = document.getElementById('formSave');
    if (!saveBtn) return;

    // Add error message elements to required fields
    var nameInput = document.getElementById('formName');
    var categorySelect = document.getElementById('formCategory');

    addErrorMessage(nameInput, '워크플로우 이름을 입력해주세요.');
    addErrorMessage(categorySelect, '카테고리를 선택해주세요.');

    // Listen for input to clear validation errors
    if (nameInput) {
      nameInput.addEventListener('input', function() {
        clearFieldError(this);
      });
    }
    if (categorySelect) {
      categorySelect.addEventListener('change', function() {
        clearFieldError(this);
      });
    }

    // Intercept the save click to add visual validation
    saveBtn.addEventListener('click', function(e) {
      var isValid = true;

      if (nameInput && !nameInput.value.trim()) {
        showFieldError(nameInput);
        isValid = false;
      }
      if (categorySelect && !categorySelect.value) {
        showFieldError(categorySelect);
        isValid = false;
      }

      if (!isValid) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true); // Use capture phase to run before the main handler
  }

  function addErrorMessage(el, message) {
    if (!el) return;
    var errorEl = document.createElement('div');
    errorEl.className = 'form-error';
    errorEl.textContent = message;
    el.parentNode.appendChild(errorEl);
  }

  function showFieldError(el) {
    el.classList.add('invalid');
    var errorEl = el.parentNode.querySelector('.form-error');
    if (errorEl) errorEl.classList.add('visible');
    // Shake animation
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'shake 0.4s ease';
  }

  function clearFieldError(el) {
    el.classList.remove('invalid');
    var errorEl = el.parentNode.querySelector('.form-error');
    if (errorEl) errorEl.classList.remove('visible');
  }

  // ============================================================
  // [B5] Scroll-to-Top Enhancement
  // ============================================================

  function enhanceScrollToTop() {
    var btn = document.getElementById('scrollTopBtn');
    if (!btn) return;

    // Ensure button content is the up arrow
    btn.textContent = '▲';
    btn.setAttribute('aria-label', '맨 위로 스크롤');
    btn.setAttribute('title', '맨 위로');

    // The CSS above handles positioning (right: 32px) and fade animation.
    // The existing JS at line 6518-6531 already handles show/hide on scroll > 300px.
    // No additional JS needed for scroll-to-top.
  }

})();
</script>
