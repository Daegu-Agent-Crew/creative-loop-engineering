// ── Collab Lines (Sub-agents) - Enhanced Fiber Optic (Phase 2) + Run 2: Dots, Error, Pending ──

function renderCollabLines(subAgents) {
  if (!subAgents || subAgents.length === 0) return;
  cancelCollabAnims();

  // Collect unique child agents
  var children = {};
  subAgents.forEach(function(sa) {
    if (sa.direction === 'request') {
      children[sa.childId] = { name: sa.childName, purpose: sa.purpose, latencyMs: sa.latencyMs, dataSize: sa.dataSize, status: sa.status };
    }
  });

  var html = '<svg id="collab-svg" style="position:absolute;pointer-events:none;z-index:5;overflow:visible;width:100%;height:100%;top:0;left:0;"></svg>';
  Object.keys(children).forEach(function(cid) {
    var c = children[cid];
    var emoji = cid.includes('claude') ? '🤖' : cid.includes('gemini') ? '💎' : '🔧';
    html += '<div class="sub-agent-node" data-cid="' + cid + '">' +
      '<div class="sa-avatar glass-card" style="background:var(--bg-card)">' + emoji + '</div>' +
      '<div class="sa-name">' + c.name + '</div>' +
      '<div class="sa-purpose">' + c.purpose + '</div>' +
    '</div>';
  });
  $collabArea.innerHTML = html;

  // Draw fiber optic lines after DOM render
  requestAnimationFrame(function() {
    var collabSvg = document.getElementById('collab-svg');
    if (!collabSvg) return;
    var avatarRect = $avatarContainer.getBoundingClientRect();
    var theaterRect = $theater.getBoundingClientRect();
    var avatarCx = avatarRect.left - theaterRect.left + avatarRect.width / 2;
    var avatarCy = avatarRect.top - theaterRect.top + avatarRect.height / 2;

    collabSvg.style.width = theaterRect.width + 'px';
    collabSvg.style.height = theaterRect.height + 'px';

    var svgDefs = '<defs>' +
      '<filter id="fiberGlowFilter"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>' +
      '</defs>';
    var svgContent = svgDefs;

    subAgents.forEach(function(sa, idx) {
      var nodeEl = $collabArea.querySelector('[data-cid="' + (sa.direction === 'request' ? sa.childId : sa.parentId) + '"]');
      if (!nodeEl) return;
      var nodeRect = nodeEl.getBoundingClientRect();
      var nx = nodeRect.left - theaterRect.left + nodeRect.width / 2;
      var ny = nodeRect.top - theaterRect.top + nodeRect.height / 2;

      var isReq = sa.direction === 'request';
      var sx = isReq ? avatarCx : nx;
      var sy = isReq ? avatarCy : ny;
      var ex = isReq ? nx : avatarCx;
      var ey = isReq ? ny : avatarCy;

      var midX = (sx + ex) / 2;
      var midY = (sy + ey) / 2 - 20;
      var pathD = 'M' + sx + ',' + sy + ' Q' + midX + ',' + midY + ' ' + ex + ',' + ey;
      var lineClass = isReq ? 'fiber-line fiber-line-request' : 'fiber-line fiber-line-response';
      var pathId = 'fiber-path-' + idx;

      // Run 2: Add error/pending classes based on status
      if (sa.status === 'error') {
        lineClass += ' collab-error-line';
      } else if (sa.status === 'pending') {
        lineClass += ' collab-pending-line';
      }

      svgContent += '<path id="' + pathId + '" d="' + pathD + '" class="' + lineClass + '" filter="url(#fiberGlowFilter)"/>';

      // Data size label
      var sizeLabel = sa.dataSize >= 1024 ? (sa.dataSize / 1024).toFixed(1) + 'KB' : sa.dataSize + 'B';
      svgContent += '<text x="' + midX + '" y="' + (midY - 6) + '" class="collab-data-label">' + sizeLabel + '</text>';
    });

    collabSvg.innerHTML = svgContent;

    // Animate data packets along paths + Run 2: 3 dots per line
    subAgents.forEach(function(sa, idx) {
      var pathEl = document.getElementById('fiber-path-' + idx);
      if (!pathEl || !pathEl.getTotalLength) return;

      var totalLen = pathEl.getTotalLength();

      // Run 2: Create 3 dots per line with offset
      var dotCount = 3;
      for (var d = 0; d < dotCount; d++) {
        var packet = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        packet.setAttribute('r', sa.status === 'error' ? '2' : '3');
        packet.setAttribute('class', 'fiber-packet');
        if (sa.status === 'error') {
          packet.setAttribute('fill', '#ef4444');
        }
        collabSvg.appendChild(packet);

        var duration = 1500 + idx * 400;
        var dotOffset = d / dotCount;

        (function(pkt, dur, off) {
          var startTime = null;
          function animPacket(ts) {
            if (!startTime) startTime = ts;
            var elapsed = ts - startTime;
            var progress = ((elapsed % dur) / dur + off) % 1;
            var pt = pathEl.getPointAtLength(progress * totalLen);
            pkt.setAttribute('cx', pt.x);
            pkt.setAttribute('cy', pt.y);
            var alpha = progress < 0.1 ? progress / 0.1 : progress > 0.9 ? (1 - progress) / 0.1 : 1;
            pkt.setAttribute('opacity', alpha);
            if (app.playbackState !== 'stopped') {
              var fid = requestAnimationFrame(animPacket);
              app.collabAnimFrames.push(fid);
            }
          }
          var fid = requestAnimationFrame(animPacket);
          app.collabAnimFrames.push(fid);
        })(packet, duration, dotOffset);
      }
    });
  });
}

// ── Decision Tree Renderer (Phase 2) + Run1: Hover interaction ──

function renderDecisionTree(scenarioId) {
  var container = document.getElementById('decision-tree-container');
  if (!container) return;
  var tree = DECISION_TREES[scenarioId];
  if (!tree) { container.innerHTML = '<div class="placeholder-content">데이터 없음</div>'; return; }

  // Layout the tree: assign x,y to each node
  var nodePositions = [];
  var edges = [];
  var maxDepth = 0;
  var leafCount = 0;

  // First pass: count leaves per depth for spacing
  function countLeaves(node) {
    if (!node.children || node.children.length === 0) return 1;
    var sum = 0;
    node.children.forEach(function(c) { sum += countLeaves(c); });
    return sum;
  }

  var totalLeaves = countLeaves(tree);
  var svgWidth = 210;
  var ySpacing = 48;

  // Assign positions using recursive layout
  var leafIndex = 0;
  function layoutNode(node, depth) {
    if (depth > maxDepth) maxDepth = depth;
    if (!node.children || node.children.length === 0) {
      var x = 20 + (leafIndex / (Math.max(totalLeaves - 1, 1))) * (svgWidth - 40);
      var y = 24 + depth * ySpacing;
      nodePositions.push({ node: node, x: x, y: y });
      leafIndex++;
      return { x: x, y: y };
    }
    var childPositions = [];
    node.children.forEach(function(c) {
      var cp = layoutNode(c, depth + 1);
      childPositions.push(cp);
      edges.push({ from: node, to: c, fromPos: null, toPos: cp });
    });
    var avgX = childPositions.reduce(function(s, p) { return s + p.x; }, 0) / childPositions.length;
    var y = 24 + depth * ySpacing;
    var pos = { x: avgX, y: y };
    nodePositions.push({ node: node, x: avgX, y: y });
    // Fix edge fromPos
    edges.forEach(function(e) { if (e.from === node) e.fromPos = pos; });
    return pos;
  }

  layoutNode(tree, 0);
  var svgHeight = (maxDepth + 1) * ySpacing + 30;

  var svg = '<svg class="decision-tree-svg" viewBox="0 0 ' + svgWidth + ' ' + svgHeight + '" xmlns="http://www.w3.org/2000/svg">';

  // Edges - add data attributes for hover interaction
  edges.forEach(function(e) {
    if (!e.fromPos || !e.toPos) return;
    var cls = (e.from.isSelected && e.to.isSelected) ? 'dt-edge-selected' : 'dt-edge-unselected';
    svg += '<line x1="' + e.fromPos.x + '" y1="' + (e.fromPos.y + 8) + '" x2="' + e.toPos.x + '" y2="' + (e.toPos.y - 8) + '" class="' + cls + '" data-from="' + e.from.id + '" data-to="' + e.to.id + '"/>';
  });

  // Nodes - wrap in groups for hover interaction
  nodePositions.forEach(function(np) {
    var n = np.node;
    var circleCls = n.isSelected ? 'dt-node-circle-selected' : 'dt-node-circle-unselected';
    var textCls = n.isSelected ? 'dt-node-selected' : 'dt-node-unselected';
    var r = n.id === 'root' ? 10 : 7;

    // Build connection list for this node
    var connIds = [];
    edges.forEach(function(e) {
      if (e.from.id === n.id) connIds.push(e.to.id);
      if (e.to.id === n.id) connIds.push(e.from.id);
    });

    svg += '<g class="dt-node-group" data-node-id="' + n.id + '" data-connections="' + connIds.join(',') + '">';
    svg += '<circle cx="' + np.x + '" cy="' + np.y + '" r="' + r + '" class="' + circleCls + '"/>';
    svg += '<g class="' + textCls + '"><text x="' + np.x + '" y="' + (np.y + r + 12) + '" text-anchor="middle" font-size="9">' + n.label + '</text></g>';
    if (n.probability !== undefined) {
      svg += '<text x="' + np.x + '" y="' + (np.y - r - 3) + '" class="dt-prob" text-anchor="middle">' + (n.probability * 100).toFixed(0) + '%</text>';
    }
    if (n.detail && n.isSelected) {
      svg += '<text x="' + np.x + '" y="' + (np.y + r + 22) + '" class="dt-detail" text-anchor="middle">' + n.detail + '</text>';
    }
    svg += '</g>';
  });

  svg += '</svg>';
  container.innerHTML = svg;

  // Run1: Wire up hover interaction
  var svgEl = container.querySelector('svg');
  if (svgEl) {
    var nodeGroups = svgEl.querySelectorAll('.dt-node-group');
    var edgeLines = svgEl.querySelectorAll('line');

    nodeGroups.forEach(function(group) {
      group.addEventListener('mouseenter', function() {
        var nodeId = group.dataset.nodeId;
        var connections = group.dataset.connections ? group.dataset.connections.split(',') : [];

        // Dim all nodes, highlight connected
        nodeGroups.forEach(function(g) {
          var gId = g.dataset.nodeId;
          if (gId === nodeId || connections.indexOf(gId) !== -1) {
            g.classList.add('dt-hover-connected');
            g.classList.remove('dt-hover-dimmed');
          } else {
            g.classList.add('dt-hover-dimmed');
            g.classList.remove('dt-hover-connected');
          }
        });

        // Highlight connected edges
        edgeLines.forEach(function(line) {
          var fromId = line.dataset.from;
          var toId = line.dataset.to;
          if (fromId === nodeId || toId === nodeId) {
            line.classList.add('dt-edge-hover-highlight');
          } else {
            line.style.opacity = '0.15';
          }
        });
      });

      group.addEventListener('mouseleave', function() {
        nodeGroups.forEach(function(g) {
          g.classList.remove('dt-hover-connected');
          g.classList.remove('dt-hover-dimmed');
        });
        edgeLines.forEach(function(line) {
          line.classList.remove('dt-edge-hover-highlight');
          line.style.opacity = '';
        });
      });
    });
  }
}

// ── Memory Graph Renderer (Phase 2) + Run1: Node size by connections + pulse ──

function renderMemoryGraph(scenarioId) {
  var container = document.getElementById('memory-graph-container');
  if (!container) return;
  var nodes = MEMORY_NODES[scenarioId];
  if (!nodes || nodes.length === 0) { container.innerHTML = '<div class="placeholder-content">데이터 없음</div>'; return; }

  var svgWidth = 210;
  var svgHeight = 200;
  var cx = svgWidth / 2;
  var cy = svgHeight / 2;

  // Run1: Count connections for each node
  var connectionCounts = {};
  nodes.forEach(function(n) {
    connectionCounts[n.id] = n.connections ? n.connections.length : 0;
  });

  // Arrange nodes in a circle, index node at center
  var positions = {};
  var nonIndex = nodes.filter(function(n) { return n.type !== 'index'; });
  var indexNode = nodes.find(function(n) { return n.type === 'index'; });

  if (indexNode) {
    positions[indexNode.id] = { x: cx, y: cy };
  }

  var radius = Math.min(svgWidth, svgHeight) * 0.35;
  nonIndex.forEach(function(n, i) {
    var angle = (2 * Math.PI * i / nonIndex.length) - Math.PI / 2;
    positions[n.id] = {
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle)
    };
  });

  var svg = '<svg class="memory-graph-svg" viewBox="0 0 ' + svgWidth + ' ' + svgHeight + '" xmlns="http://www.w3.org/2000/svg">';

  // Draw edges
  var drawnEdges = {};
  nodes.forEach(function(n) {
    n.connections.forEach(function(connId) {
      var key = [n.id, connId].sort().join('-');
      if (drawnEdges[key]) return;
      drawnEdges[key] = true;
      var p1 = positions[n.id];
      var p2 = positions[connId];
      if (p1 && p2) {
        svg += '<line x1="' + p1.x + '" y1="' + p1.y + '" x2="' + p2.x + '" y2="' + p2.y + '" class="mg-edge"/>';
      }
    });
  });

  // Draw nodes - Run1: radius proportional to connections + pulse glow
  var maxConns = Math.max.apply(null, nodes.map(function(n) { return connectionCounts[n.id]; }));
  if (maxConns < 1) maxConns = 1;

  nodes.forEach(function(n, idx) {
    var pos = positions[n.id];
    if (!pos) return;
    var connCount = connectionCounts[n.id];
    // Run1: Node radius based on connections (min 8, max 22)
    var r = 8 + (connCount / maxConns) * 14;
    var circleCls = 'mg-node-circle-' + n.type;
    // Run1: Add pulse to nodes with most connections (simulating "recently updated")
    var pulseClass = connCount >= 2 ? ' mg-node-pulse' : '';
    var pulseStyle = pulseClass ? ' style="animation-delay:' + (idx * 0.4) + 's"' : '';
    svg += '<g class="mg-node' + pulseClass + '"' + pulseStyle + '>';
    svg += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + r.toFixed(1) + '" class="' + circleCls + '"/>';
    svg += '<text x="' + pos.x + '" y="' + (pos.y + r + 12) + '" class="mg-label">' + n.label + '</text>';
    svg += '<text x="' + pos.x + '" y="' + (pos.y + r + 22) + '" class="mg-file-label">' + n.file + '</text>';
    svg += '</g>';
  });

  svg += '</svg>';
  container.innerHTML = svg;
}

  scenario.turn.steps.forEach(function(s) {
    var w = Math.max(4, (s.durationMs / maxDur) * 100);

// Run1: Enhanced Token Waterfall with drop animation and inference spark
function renderTokenWaterfall(scenario) {
  var steps = scenario.turn.steps;
  var phases = [
    { label: 'Input조립', type: 'intent', color: '#3b82f6' },
    { label: '컨텍스트', type: 'context', color: '#8b5cf6' },
    { label: '기억검색', type: 'memory', color: '#22c55e' },
    { label: '추론', type: 'inference', color: '#eab308' },
    { label: '도구호출', type: 'tool_call', color: '#ef4444' },
    { label: '응답생성', type: 'response', color: '#00d4ff' }
  ];

  var totalMs = scenario.turn.totalDurationMs;
  var cumulative = 0;

  var html = '<div class="stat-section"><div class="ss-title">토큰 라이프사이클</div>';

  phases.forEach(function(phase) {
    var step = steps.find(function(s) { return s.type === phase.type; });
    var dur = step ? step.durationMs : 0;
    var leftPct = (cumulative / totalMs) * 100;
    var widthPct = (dur / totalMs) * 100;

    // Run1: Add inference spark class
    var extraClass = phase.type === 'inference' ? ' wf-inference-bar' : '';

    html += '<div class="waterfall-row">' +
      '<span class="waterfall-label">' + phase.label + '</span>' +
      '<div class="waterfall-track">' +
        '<div class="waterfall-bar' + extraClass + '" style="background:' + phase.color + ';width:0;left:0;opacity:0.8" data-target-width="' + widthPct + '%" data-target-left="' + leftPct + '%"></div>' +
      '</div>' +
      '<span class="waterfall-ms">' + dur + 'ms</span>' +
    '</div>';

    cumulative += dur;
  });

  html += '</div>';
  return html;
}

// Run 2: Enhanced Context Influence with heatmap, pulse, tooltip
function renderContextInfluence(scenario) {
  // Get context step
  var ctxStep = scenario.turn.steps.find(function(s) { return s.type === 'context'; });
  if (!ctxStep || !ctxStep.metadata.files || ctxStep.metadata.files.length === 0) return '';

  var html = '<div class="stat-section"><div class="ss-title">컨텍스트 영향도</div>';

  ctxStep.metadata.files.forEach(function(f) {
    var widthPct = (f.influenceScore * 100) + '%';

    // Run 2: Compute heatmap color: blue(0) -> yellow(0.5) -> red(1)
    var score = f.influenceScore;
    var r, g, b;
    if (score < 0.5) {
      var t = score / 0.5;
      r = Math.round(59 + (234 - 59) * t);
      g = Math.round(130 + (179 - 130) * t);
      b = Math.round(246 + (8 - 246) * t);
    } else {
      var t = (score - 0.5) / 0.5;
      r = Math.round(234 + (239 - 234) * t);
      g = Math.round(179 + (68 - 179) * t);
      b = Math.round(8 + (68 - 8) * t);
    }
    var heatColor = 'rgb(' + r + ',' + g + ',' + b + ')';

    // Run 2: Determine pulse class
    var pulseClass = score >= 0.7 ? ' influence-pulse' : '';

    // Run 2: Determine tooltip text
    var tooltipText = '';
    var fName = f.name.toUpperCase();
    if (fName.indexOf('TOOLS') !== -1) {
      tooltipText = '도구 선택에 영향';
    } else if (fName.indexOf('USER') !== -1 || fName.indexOf('SOUL') !== -1) {
      tooltipText = '톤 결정에 영향';
    } else if (fName.indexOf('AGENTS') !== -1) {
      tooltipText = '안전 경계에 영향';
    } else {
      tooltipText = '컨텍스트 영향: ' + (score * 100).toFixed(0) + '%';
    }

    html += '<div class="influence-row' + pulseClass + '">' +
      '<span class="influence-name" title="' + f.name + '">' + f.name + '</span>' +
      '<div class="influence-bar-track">' +
        '<div class="influence-bar" style="width:0;background:' + heatColor + '" data-target-width="' + widthPct + '"></div>' +
      '</div>' +
      '<span class="influence-score">' + f.influenceScore.toFixed(1) + '</span>' +
      '<div class="influence-tooltip">' + tooltipText + '</div>' +
    '</div>';
  });

  html += '</div>';
  return html;
}

function renderAnalyticsTimeline(scenario) {

    // Color-blind accessible icon supplement
    var a11yIcon = rating === 'free' ? '<span class="a11y-status-icon" title="자유">O</span>' : rating === 'caution' ? '<span class="a11y-status-icon" title="주의">!</span>' : '<span class="a11y-status-icon" title="금지">X</span>';

    if (step.type === 'inference' && i < steps.length - 1) {
      html += '<div class="timeline-compaction-marker" title="컨텍스트 압축">⚡</div>';
    }
  });

  html += '</div></div></div>';
  return html;
}

function wireAnalyticsTimeline() {
  var blocks = document.querySelectorAll('.timeline-block[data-step-index]');
  blocks.forEach(function(block) {
    block.addEventListener('click', function() {
      var idx = parseInt(block.dataset.stepIndex);
      if (isNaN(idx)) return;
      // Navigate Cortex Theater to that point
      if (!app.currentScenario) return;
      if (app.playbackState === 'playing') pause();
      // Re-render up to that step
      clearCascade();
      $speechBubble.classList.remove('show');
      $speechBubble.classList.remove('speaking-active');
      $speechText.innerHTML = '';
      $speechToolCardArea.innerHTML = '';
      $safetyOverlay.classList.remove('show');
      $collabArea.innerHTML = '';
      cancelCollabAnims();
      $skillHologram.classList.remove('show');
      app.currentStepIndex = -1;

      for (var i = 0; i <= idx; i++) {
        var step = app.currentScenario.turn.steps[i];
        renderStepCard(step, i);
        var card = $cascadeContainer.querySelectorAll('.thought-card')[i];
        if (card) {
          card.classList.add('visible');
          if (i < idx) card.style.animation = 'none';
        }
        if (i > 0) renderSynapseLine(i - 1, i);
        lightStepIcon(i);
      }
      app.currentStepIndex = idx;

      var curStep = app.currentScenario.turn.steps[idx];
      if (curStep.type === 'response') {
        setAvatarStatus('speaking');
        showSpeechBubble(curStep.metadata.text);
      } else if (curStep.type === 'tool_call') {
        setAvatarStatus(curStep.metadata.statusCode === 403 ? 'error' : 'tool_calling');
      } else {
        setAvatarStatus('thinking');
      }

      updateActiveCard(idx);
      updateAnalyticsTimeline(idx);
    });
  });
}

function updateAnalyticsTimeline(activeIndex) {
  var blocks = document.querySelectorAll('.timeline-block[data-step-index]');
  blocks.forEach(function(block) {
    var idx = parseInt(block.dataset.stepIndex);
    if (idx === activeIndex) {
      block.classList.add('active-block');
    } else {
      block.classList.remove('active-block');
    }
  });
}

function triggerErrorVisualization(errorInfo) {

// ── Step Navigation (J/K) (P1-11) ──

function stepForward() {
  if (!app.currentScenario) return;
  var steps = app.currentScenario.turn.steps;
  var nextIdx = app.currentStepIndex + 1;
  if (nextIdx >= steps.length) return;

  if (app.playbackState === 'playing') pause();

  showStep(nextIdx);
}

function stepBackward() {
  if (!app.currentScenario) return;
  var prevIdx = app.currentStepIndex - 1;
  if (prevIdx < 0) return;

  if (app.playbackState === 'playing') pause();

  // Re-render up to prevIdx
  clearCascade();
  $speechBubble.classList.remove('show');
  $speechBubble.classList.remove('speaking-active');
  $speechText.innerHTML = '';
  $speechToolCardArea.innerHTML = '';
  $safetyOverlay.classList.remove('show');
  $collabArea.innerHTML = '';
  cancelCollabAnims();
  $skillHologram.classList.remove('show');
  app.currentStepIndex = -1;

  for (var i = 0; i <= prevIdx; i++) {
    var step = app.currentScenario.turn.steps[i];
    renderStepCard(step, i);
    // Make visible immediately (no animation for rewound steps)
    var card = $cascadeContainer.querySelectorAll('.thought-card')[i];
    if (card) {
      card.classList.add('visible');
      card.style.animation = 'none';
    }
    if (i > 0) renderSynapseLine(i - 1, i);
    lightStepIcon(i);
  }
  app.currentStepIndex = prevIdx;

  // Avatar status for current step
  var curStep = app.currentScenario.turn.steps[prevIdx];
  if (curStep.type === 'response') {
    setAvatarStatus('speaking');
    showSpeechBubble(curStep.metadata.text);
  } else if (curStep.type === 'tool_call') {
    setAvatarStatus(curStep.metadata.statusCode === 403 ? 'error' : 'tool_calling');
  } else {
    setAvatarStatus('thinking');
  }

  updateActiveCard(prevIdx);
}

function handleChatSend() {
  var text = $chatInput.value.trim();
  if (!text) return;
  $chatInput.value = '';
  addChatMessage('user', text);

  // In simulation mode, try to match scenario or use S-001
  var matched = null;
  if (text.includes('날씨')) matched = 's-001';
  else if (text.includes('고쳐') || text.includes('코드') || text.includes('app.py')) matched = 's-002';
  else if (text.includes('API') || text.includes('로그인') || text.includes('만들어')) matched = 's-003';
  else if (text.includes('비밀번호') || text.includes('알려줘') || text.includes('민감')) matched = 's-004';
  else matched = 's-001'; // default

  $scenarioSelect.value = matched;
  loadScenario(matched);
}

// Keyboard shortcuts (P1-11 + P3-07 shortcut modal)
var $shortcutModal = document.getElementById('shortcut-modal');

document.addEventListener('keydown', function(e) {
  // Close shortcut modal on any key
  if ($shortcutModal.classList.contains('show')) {
    $shortcutModal.classList.remove('show');
    e.preventDefault();
    return;
  }

  // Don't capture when typing in input fields
  if (document.activeElement === $chatInput ||
      document.activeElement === document.getElementById('ws-url') ||
      document.activeElement === document.getElementById('ws-token')) return;

  if (e.key === '?' || (e.shiftKey && e.key === '/')) {
    e.preventDefault();
    $shortcutModal.classList.add('show');
  } else if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (app.playbackState === 'playing') pause();
    else if (app.playbackState === 'paused') play();
    else if (app.currentScenario) play();
  } else if (e.key === 'j' || e.key === 'J') {
    e.preventDefault();
    stepBackward();
  } else if (e.key === 'k' || e.key === 'K') {
    e.preventDefault();
    stepForward();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    stopSimulation();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    var activeCard = $cascadeContainer.querySelector('.thought-card.active');
    if (activeCard) {
      activeCard.style.maxHeight = activeCard.style.maxHeight ? '' : '300px';
    }
  } else if (e.key === '1') {
    e.preventDefault();
    togglePanel('brain-panel');
  } else if (e.key === '2') {
    e.preventDefault();
    togglePanel('theater-focus');
  } else if (e.key === '3') {
    e.preventDefault();
    togglePanel('stats-panel');
  }
});

//   Phase 3: Panel Toggle (P3-06)
// ═══════════════════════════════════════════════════════════════

function togglePanel(panelKey) {
  var $brain = document.getElementById('brain-panel');
  var $stats = document.getElementById('stats-panel');
  var $app = document.getElementById('app');

  if (panelKey === 'brain-panel') {
    $brain.classList.toggle('panel-hidden');
    if ($brain.classList.contains('panel-hidden')) {
      $app.style.gridTemplateColumns = '0px 1fr 280px';
    } else {
      $app.style.gridTemplateColumns = '240px 1fr 280px';
    }
  } else if (panelKey === 'stats-panel') {
    $stats.classList.toggle('panel-hidden');
    if ($stats.classList.contains('panel-hidden')) {
      $app.style.gridTemplateColumns = '240px 1fr 0px';
    } else {
      $app.style.gridTemplateColumns = '240px 1fr 280px';
    }
  } else if (panelKey === 'theater-focus') {
    // Toggle both side panels
    var bothHidden = $brain.classList.contains('panel-hidden') && $stats.classList.contains('panel-hidden');
    if (bothHidden) {
      $brain.classList.remove('panel-hidden');
      $stats.classList.remove('panel-hidden');
      $app.style.gridTemplateColumns = '240px 1fr 280px';
    } else {
      $brain.classList.add('panel-hidden');
      $stats.classList.add('panel-hidden');
      $app.style.gridTemplateColumns = '0px 1fr 0px';
    }
  }
}

var SAFETY_RATINGS = {
  'intent': function(step, scenarioId) {
    if (scenarioId === 's-004') return 'caution';
    return 'free';
  },
  'context': function(step, scenarioId) {
    if (scenarioId === 's-004') return 'caution';
    return 'free';
  },
  'memory': function(step, scenarioId) {
    return 'free';
  },
  'inference': function(step, scenarioId) {
    if (scenarioId === 's-004') return 'forbidden';
    return 'free';
  },
  'tool_call': function(step, scenarioId) {
    if (step.metadata.statusCode === 403 || step.metadata.toolName === 'none') return 'forbidden';
    if (step.metadata.toolName === 'edit') return 'caution';
    return 'free';
  },
  'response': function(step, scenarioId) {
    if (scenarioId === 's-004') return 'forbidden';
    return 'free';
  }
};

function getSafetyRating(step, scenarioId) {
  var fn = SAFETY_RATINGS[step.type];
  return fn ? fn(step, scenarioId) : 'free';
}

function getSafetyLabel(rating) {
  if (rating === 'free') return '자유';
  if (rating === 'caution') return '주의';
  if (rating === 'forbidden') return '금지';
  return '';
}

// Run 2: Safety badge emoji mapping
function getSafetyBadgeEmoji(rating) {
  if (rating === 'free') return '\uD83D\uDFE2';    // green circle
  if (rating === 'caution') return '\uD83D\uDFE1';  // yellow circle
  if (rating === 'forbidden') return '\uD83D\uDD34'; // red circle
  return '';
}

// ═══════════════════════════════════════════════════════════════
//   Phase 3: Compaction Visualization (P3-01) + Run 2: Slider + Particles + Big Number
// ═══════════════════════════════════════════════════════════════

function renderCompaction(scenario) {
  var ts = scenario.turn.tokenStats;
  var inp = ts.input;
  var outTokens = ts.output.tokenCount;
  var totalInput = inp.total;
  // Simulated "after compaction" = summarized context (roughly 30-60% of original)
  var compactionRatio = scenario.id === 's-004' ? 0.35 : scenario.id === 's-003' ? 0.55 : scenario.id === 's-002' ? 0.50 : 0.45;
  var afterTokens = Math.round(totalInput * compactionRatio);
  var savedTokens = totalInput - afterTokens;
  var maxVal = totalInput;
  var compressionPct = ((1 - compactionRatio) * 100).toFixed(0);

  var html = '<div class="stat-section compaction-section"><div class="ss-title">컨텍스트 압축 (Compaction)</div>';

  // Run 2: Big compression number
  html += '<div class="compaction-big-number">-' + compressionPct + '%</div>';

  // Run 2: Slider-based comparison
  html += '<div class="compaction-slider-container" id="compaction-slider-container">' +
    '<div class="compaction-before-half" id="compaction-before-half" style="width:50%">Before ' + totalInput.toLocaleString() + 't</div>' +
    '<div class="compaction-after-half" id="compaction-after-half">After ' + afterTokens.toLocaleString() + 't</div>' +
  '</div>';
  html += '<input type="range" class="compaction-slider" id="compaction-slider" min="0" max="100" value="50" aria-label="압축 비교 슬라이더">';

  // Original before/after bars (kept for compatibility)
  // Before
  html += '<div class="compaction-row">' +
    '<span class="compaction-label">Before</span>' +
    '<div class="compaction-bar-track">' +
      '<div class="compaction-bar compaction-bar-before" style="width:0" data-target-width="100%"></div>' +
    '</div>' +
    '<span class="compaction-val">' + totalInput.toLocaleString() + 't</span>' +
  '</div>';

  // Arrow
  html += '<div class="compaction-arrow">⬇ 압축 중...</div>';

  // After
  var afterPct = (afterTokens / maxVal * 100).toFixed(1);
  html += '<div class="compaction-row">' +
    '<span class="compaction-label">After</span>' +
    '<div class="compaction-bar-track">' +
      '<div class="compaction-bar compaction-bar-after" style="width:0" data-target-width="' + afterPct + '%"></div>' +
    '</div>' +
    '<span class="compaction-val">' + afterTokens.toLocaleString() + 't</span>' +
  '</div>';

  // Ratio
  html += '<div class="compaction-ratio">절감: ' + savedTokens.toLocaleString() + ' 토큰 (' + compressionPct + '% 압축)</div>';

  // Run 2: Particle container
  html += '<div id="compaction-particle-container" style="position:relative;height:0;overflow:visible;"></div>';

  html += '</div>';
  return html;
}

// Run 2: Spawn compaction particles
function spawnCompactionParticles() {
  var container = document.getElementById('compaction-particle-container');
  if (!container) return;
  for (var i = 0; i < 12; i++) {
    var p = document.createElement('div');
    p.className = 'compaction-particle';
    var flyX = (Math.random() - 0.5) * 80;
    var flyY = -(Math.random() * 40 + 10);
    p.style.setProperty('--fly-x', flyX + 'px');
    p.style.setProperty('--fly-y', flyY + 'px');
    p.style.left = (Math.random() * 100) + '%';
    p.style.top = '-' + (Math.random() * 20) + 'px';
    p.style.animationDelay = (i * 60) + 'ms';
    container.appendChild(p);
    // Remove after animation
    (function(el) {
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1000);
    })(p);
  }
}

function exportCSV() {
  if (!app.currentScenario) { alert('시나리오를 먼저 선택하세요.'); return; }
  var scenario = app.currentScenario;
  var ts = scenario.turn.tokenStats;
  var inp = ts.input;

  var rows = [];
  rows.push(['항목', '값']);
  rows.push(['시나리오', scenario.title]);
  rows.push(['사용자 메시지', scenario.userMessage]);
  rows.push(['총 소요시간(ms)', scenario.turn.totalDurationMs]);
  rows.push(['']);
  rows.push(['== Input Tokens ==', '']);
  rows.push(['System', inp.system]);
  rows.push(['SOUL', inp.soul]);
  rows.push(['USER', inp.user]);
  rows.push(['AGENTS', inp.agents]);
  rows.push(['TOOLS', inp.tools]);
  rows.push(['Memory', inp.memory]);
  rows.push(['History', inp.history]);
  rows.push(['Total Input', inp.total]);
  rows.push(['']);
  rows.push(['== Output ==', '']);
  rows.push(['Output Tokens', ts.output.tokenCount]);
  rows.push(['Speed (tok/s)', ts.output.tokPerSec]);
  rows.push(['']);
  rows.push(['== Inference ==', '']);
  rows.push(['Model', ts.inference.model]);
  rows.push(['TTFT (ms)', ts.inference.ttftMs]);
  rows.push(['Total Inference (ms)', ts.inference.totalMs]);
  rows.push(['']);
  rows.push(['== Cost ==', '']);
  rows.push(['Turn USD', ts.cost.turnUSD]);
  rows.push(['Session USD', ts.cost.sessionUSD]);
  rows.push(['']);
  rows.push(['== Steps ==', '']);
  rows.push(['단계', '유형', '소요시간(ms)', '상세']);
  scenario.turn.steps.forEach(function(s) {
    rows.push([s.label, s.type, s.durationMs, s.detail]);
  });

  var csv = rows.map(function(r) {
    return r.map(function(v) {
      var str = String(v);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }).join(',');
  }).join('\n');

  // BOM for Korean Excel compatibility
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  downloadBlob(blob, 'neural-map-' + scenario.id + '.csv');
}

// ═══════════════════════════════════════════════════════════════
//   Phase 3: JSON Export (P3-04)
// ═══════════════════════════════════════════════════════════════

function exportJSON() {
  if (!app.currentScenario) { alert('시나리오를 먼저 선택하세요.'); return; }
  var scenario = app.currentScenario;
  var data = {
    exportedAt: new Date().toISOString(),
    scenario: {
      id: scenario.id,
      title: scenario.title,
      description: scenario.description,
      userMessage: scenario.userMessage
    },
    turn: scenario.turn,
    decisionTree: DECISION_TREES[scenario.id] || null,
    memoryNodes: MEMORY_NODES[scenario.id] || null,
    skillInfo: SKILL_INFOS[scenario.id] || null
  };

  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json;charset=utf-8;' });
  downloadBlob(blob, 'neural-map-' + scenario.id + '.json');
}

function downloadBlob(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function() {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
}

//   Run 3: Minimap
// ═══════════════════════════════════════════════════════════════

(function() {
  var minimap = document.getElementById('minimap');
  var viewport = document.getElementById('minimap-viewport');
  if (!minimap || !viewport) return;

  function updateMinimap() {
    var docW = document.documentElement.clientWidth;
    var docH = document.documentElement.clientHeight;
    var scrollLeft = window.scrollX || 0;
    var scrollTop = window.scrollY || 0;

    // The page is mostly 100vh, but calculate viewport indicator
    var mmW = 120;
    var mmH = 80;
    var scaleX = mmW / Math.max(docW, 1);
    var scaleY = mmH / Math.max(docH, 1);

    viewport.style.width = Math.max(20, mmW * (docW / Math.max(docW, docW + 1))) + 'px';
    viewport.style.height = Math.max(12, mmH * (docH / Math.max(docH, docH + 1))) + 'px';
    viewport.style.left = (scrollLeft * scaleX) + 'px';
    viewport.style.top = (scrollTop * scaleY) + 'px';
  }

  updateMinimap();
  window.addEventListener('resize', updateMinimap);
  window.addEventListener('scroll', updateMinimap);

  // Click to navigate (scroll panels)
  minimap.addEventListener('click', function(e) {
    var rect = minimap.getBoundingClientRect();
    var relX = (e.clientX - rect.left) / rect.width;
    var relY = (e.clientY - rect.top) / rect.height;

    // Determine which zone was clicked and scroll that panel
    if (relY < 0.12) {
      // Header - do nothing
    } else if (relY < 0.72) {
      if (relX < 0.24) {
        // Brain panel - scroll to top
        var bp = document.getElementById('brain-panel');
        if (bp) bp.scrollTop = 0;
      } else if (relX > 0.76) {
        // Stats panel - scroll to relative position
        var sp = document.getElementById('stats-panel');
        if (sp) {
          var relPosInZone = (relY - 0.12) / 0.60;
          sp.scrollTop = relPosInZone * sp.scrollHeight;
        }
      } else {
        // Theater - scroll to relative position
        var th = document.getElementById('theater');
        if (th) {
          var relPosInZone = (relY - 0.12) / 0.60;
          th.scrollTop = relPosInZone * th.scrollHeight;
        }
      }
    } else {
      // Chat panel
      var cp = document.getElementById('chat-messages');
      if (cp) cp.scrollTop = cp.scrollHeight;
    }
  });
})();
