<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>맞고 고스톱 v7</title>
<style>
/* ============================================================
   GO-STOP v7 — FULL STYLESHEET
   Based on v4 with v6/v7 UI/UX enhancements
   ============================================================ */

/* === THEME & BASE === */
:root {
  --bg-color: #0a3d18;
  --bg-gradient: linear-gradient(145deg, #0a3d18 0%, #1a6b30 30%, #0d4a1f 60%, #14571e 100%);
  --text-color: #fff;
  --card-bg: #fff;
  --card-border: #ccc;
  --card-shadow: rgba(0,0,0,0.4);
  --panel-bg: rgba(0,0,0,0.25);
  --panel-border: rgba(255,255,255,0.15);
  --btn-bg: #e74c3c;
  --btn-hover: #c0392b;
  --btn-secondary: #3498db;
  --btn-secondary-hover: #2980b9;
  --captured-bg: rgba(0,0,0,0.2);
  --floor-bg: rgba(0,0,0,0.15);
  --notify-bg: rgba(0,0,0,0.85);
  --accent: #f1c40f;
  --accent-glow: rgba(255,215,0,0.5);
  --danger: #e74c3c;
  --success: #2ecc71;
  --warning: #f39c12;
  --info: #3498db;
  --card-radius: 8px;
  --card-w: 70px;
  --card-h: 105px;
  --card-small-w: 42px;
  --card-small-h: 63px;
}

[data-theme="dark"] {
  --bg-color: #0a0f18;
  --bg-gradient: linear-gradient(145deg, #0a0f18 0%, #0f1f28 30%, #0a1a20 60%, #0d1e18 100%);
  --text-color: #e0e0e0;
  --card-bg: #2a2a4a;
  --card-border: #444;
  --card-shadow: rgba(0,0,0,0.6);
  --panel-bg: rgba(0,0,0,0.45);
  --panel-border: rgba(255,255,255,0.1);
  --captured-bg: rgba(255,255,255,0.05);
  --floor-bg: rgba(255,255,255,0.05);
  --notify-bg: rgba(10,15,30,0.95);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-color);
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* === LAYOUT === */
#game-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 8px;
  position: relative;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--panel-bg);
  border-radius: 10px;
  margin-bottom: 8px;
  border: 1px solid var(--panel-border);
  flex-wrap: wrap;
  gap: 4px;
  backdrop-filter: blur(6px);
}

.header h1 {
  font-size: 1.2em;
  background: linear-gradient(90deg, #f1c40f, #e74c3c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

/* === BUTTONS === */
.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85em;
  font-weight: 600;
  transition: all 0.2s;
  color: #fff;
}

.btn-primary { background: var(--btn-bg); }
.btn-primary:hover { background: var(--btn-hover); transform: scale(1.05); }
.btn-secondary { background: var(--btn-secondary); }
.btn-secondary:hover { background: var(--btn-secondary-hover); transform: scale(1.05); }
.btn-small { padding: 4px 10px; font-size: 0.75em; }
.btn-success { background: var(--success); }
.btn-warning { background: var(--warning); color: #333; }
.btn-info { background: var(--info); }

/* === PLAYER AREAS === */
.player-area {
  background: var(--panel-bg);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 6px;
  border: 1px solid var(--panel-border);
  transition: border-color 0.3s, box-shadow 0.3s;
  backdrop-filter: blur(4px);
}

.player-area.active {
  border-color: var(--accent);
  box-shadow: 0 0 15px rgba(241,196,15,0.3);
}

.player-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.player-name { font-weight: 700; font-size: 0.95em; }

.player-stats { display: flex; gap: 10px; font-size: 0.8em; }

.stat {
  background: var(--captured-bg);
  padding: 2px 8px;
  border-radius: 4px;
}

.stat-label { opacity: 0.7; margin-right: 3px; }
.stat-value { font-weight: 700; }

/* === TURN INDICATOR === */
.turn-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  background: var(--panel-bg);
  border-radius: 20px;
  border: 1px solid var(--panel-border);
  font-size: 0.82em;
  font-weight: 600;
}

.turn-indicator .turn-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  animation: turnDotPulse 1.2s ease-in-out infinite;
}

.turn-indicator .turn-dot.ai {
  background: var(--danger);
}

.turn-indicator .turn-dot.inactive {
  background: rgba(255,255,255,0.3);
  animation: none;
}

@keyframes turnDotPulse {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { transform: scale(1.3); opacity: 0.85; box-shadow: 0 0 0 6px rgba(255,215,0,0); }
}

/* === CARDS === */
.cards-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  min-height: 60px;
  align-items: flex-start;
}

.card {
  width: var(--card-w);
  height: var(--card-h);
  border-radius: var(--card-radius);
  border: 2px solid var(--card-border);
  background: var(--card-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  font-size: 0.65em;
  color: #333;
  box-shadow: 0 2px 8px var(--card-shadow);
  flex-shrink: 0;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 8px 16px var(--accent-glow);
}

.card.selected {
  transform: translateY(-10px);
  border: 3px solid #ffd700;
  box-shadow: 0 0 12px var(--accent-glow);
}

.card.face-down {
  background: linear-gradient(135deg, #c0392b 0%, #8e2323 100%);
  border-color: #7f1d1d;
  cursor: default;
}

.card.face-down::after { content: '🎴'; font-size: 1.8em; }
.card.disabled { opacity: 0.5; pointer-events: none; }
.card-month { font-size: 1.1em; font-weight: 700; line-height: 1; }
.card-type { font-size: 0.85em; margin-top: 2px; }
.card-icon { font-size: 1.4em; margin-bottom: 1px; }

/* Card image support */
.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: calc(var(--card-radius) - 2px);
  display: block;
  position: absolute;
  top: 0;
  left: 0;
}

/* Card type colors */
.card.gwang { border-color: #e74c3c; background: linear-gradient(135deg, #fff5f5, #ffe0e0); }
.card.tti   { border-color: #3498db; background: linear-gradient(135deg, #f0f7ff, #dbeeff); }
.card.dan   { border-color: #e67e22; background: linear-gradient(135deg, #fff8f0, #ffe8cc); }
.card.pi    { border-color: #95a5a6; background: linear-gradient(135deg, #f8f9fa, #ecf0f1); }
.card.ssang-pi { border-color: #7f8c8d; background: linear-gradient(135deg, #f0f0f0, #ddd); }

/* Small cards for captured area */
.card.small {
  width: var(--card-small-w);
  height: var(--card-small-h);
  font-size: 0.5em;
  cursor: default;
}
.card.small:hover { transform: none; box-shadow: 0 2px 8px var(--card-shadow); }

/* === FLOOR === */
.floor-area {
  background: var(--floor-bg);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 6px;
  border: 2px dashed var(--panel-border);
  min-height: 90px;
}

.floor-label { font-size: 0.75em; opacity: 0.6; margin-bottom: 6px; }
.floor-cards { display: flex; flex-wrap: wrap; gap: 4px; }
.floor-stack { position: relative; margin-right: 2px; }

/* === CAPTURED AREA === */
.captured-area {
  margin-top: 6px;
  padding: 6px 8px;
  background: var(--captured-bg);
  border-radius: 6px;
}

.captured-section { margin-bottom: 4px; }
.captured-label { font-size: 0.65em; opacity: 0.6; margin-bottom: 2px; }
.captured-cards { display: flex; flex-wrap: wrap; gap: 2px; }

/* === DECK & INFO === */
.game-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  background: var(--panel-bg);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 0.8em;
  backdrop-filter: blur(4px);
}

/* === NOTIFICATION === */
.notification-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

.notification-overlay.show { opacity: 1; }

.notification-box {
  background: var(--notify-bg);
  border-radius: 16px;
  padding: 24px 48px;
  text-align: center;
  transform: scale(0.5);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border: 2px solid;
}

.notification-overlay.show .notification-box { transform: scale(1); }
.notification-box.danger  { border-color: var(--danger); }
.notification-box.warning { border-color: var(--warning); }
.notification-box.success { border-color: var(--success); }
.notification-box.info    { border-color: var(--info); }

.notification-text {
  font-size: 2em;
  font-weight: 900;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.notification-sub {
  font-size: 0.9em;
  opacity: 0.8;
  margin-top: 6px;
}

/* === SCORE POPUP === */
.score-popup {
  position: absolute;
  font-size: 1.2em;
  font-weight: 900;
  color: #ffd700;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  pointer-events: none;
  animation: scorePopup 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  z-index: 900;
}

/* === GO/STOP MODAL === */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.modal {
  background: var(--panel-bg);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 30px 40px;
  text-align: center;
  border: 2px solid var(--accent);
  max-width: 90vw;
}

.modal h2 { font-size: 1.5em; margin-bottom: 12px; }
.modal p  { margin-bottom: 16px; opacity: 0.9; }
.modal .btn { margin: 0 8px; padding: 10px 24px; font-size: 1em; }

/* === MATCH SELECT MODAL === */
.match-options {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 8px;
}

.match-option {
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid var(--accent);
  background: var(--panel-bg);
  color: var(--text-color);
  transition: all 0.2s;
}

.match-option:hover {
  background: var(--accent);
  color: #333;
}

/* === ANIMATIONS === */
@keyframes bombExplode {
  0%   { transform: scale(1) rotate(0deg); }
  25%  { transform: scale(1.25) rotate(90deg); }
  50%  { transform: scale(1.5) rotate(180deg); background: #e74c3c; }
  75%  { transform: scale(1.25) rotate(270deg); }
  100% { transform: scale(1) rotate(360deg); }
}

/* Legacy alias */
@keyframes bomb-explode {
  0%   { transform: scale(1) rotate(0deg); }
  25%  { transform: scale(1.25) rotate(90deg); }
  50%  { transform: scale(1.5) rotate(180deg); background: #e74c3c; }
  75%  { transform: scale(1.25) rotate(270deg); }
  100% { transform: scale(1) rotate(360deg); }
}

@keyframes ppuk-flip {
  0%   { transform: translateY(0) rotateY(0); }
  50%  { transform: translateY(-30px) rotateY(180deg); }
  100% { transform: translateY(0) rotateY(360deg); }
}

@keyframes shake {
  0%, 100%                          { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90%           { transform: translateX(-8px); }
  20%, 40%, 60%, 80%                { transform: translateX(8px); }
}

@keyframes chongtong-glow {
  0%   { box-shadow: 0 0 5px #f1c40f; }
  50%  { box-shadow: 0 0 30px #f1c40f, 0 0 60px #e74c3c; }
  100% { box-shadow: 0 0 5px #f1c40f; }
}

@keyframes card-capture {
  0%   { transform: scale(1); opacity: 1; }
  50%  { transform: scale(1.2); opacity: 0.7; }
  100% { transform: scale(0.8); opacity: 0; }
}

@keyframes slide-in {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

@keyframes go-pulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.15); }
}

@keyframes cardSlideIn {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

@keyframes matchPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes scorePopup {
  0%   { transform: scale(0.5); opacity: 0; }
  60%  { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1);   opacity: 1; }
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Animation utility classes */
.bomb-anim       { animation: bombExplode 0.5s ease-in-out; }
.ppuk-anim       { animation: ppuk-flip 0.6s ease-in-out; }
.shake-anim      { animation: shake 0.5s ease-in-out; }
.chongtong-anim  { animation: chongtong-glow 1s ease-in-out infinite; }
.slide-in        { animation: slide-in 0.3s ease-out; }
.go-pulse        { animation: go-pulse 0.6s ease-in-out 3; }
.card-slide-in   { animation: cardSlideIn 0.3s ease-out; }
.match-pop       { animation: matchPop 0.3s ease-in-out; }
.score-popup-anim { animation: scorePopup 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

/* === CONFETTI === */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 5000;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
  opacity: 0;
}

/* === SCORE PANEL === */
.score-panel {
  background: var(--panel-bg);
  border-radius: 10px;
  padding: 12px;
  margin-top: 8px;
  border: 1px solid var(--panel-border);
}

.score-breakdown { font-size: 0.8em; line-height: 1.6; }
.score-line { display: flex; justify-content: space-between; padding: 2px 0; }

.score-total {
  font-size: 1.2em;
  font-weight: 700;
  border-top: 1px solid var(--panel-border);
  padding-top: 6px;
  margin-top: 6px;
}

.multiplier-badge {
  display: inline-block;
  background: var(--warning);
  color: #333;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 0.85em;
  animation: go-pulse 0.6s ease-in-out 3;
}

/* === PPUK MARKERS === */
.ppuk-marker {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--danger);
  color: #fff;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  font-size: 0.55em;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

/* === HEUNDEULGI INDICATOR === */
.heundeulgi-indicator {
  display: inline-block;
  background: var(--info);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.7em;
  margin-left: 6px;
}

/* === GAME OVER SCREEN === */
.game-over {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
}

.game-over-content {
  background: var(--panel-bg);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px 40px;
  text-align: center;
  border: 3px solid var(--accent);
  max-width: 400px;
  width: 90%;
}

.game-over h2 {
  font-size: 2em;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #f1c40f, #e74c3c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* === ACTION BUTTONS ROW === */
.action-buttons {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}

/* === HIDDEN === */
.hidden { display: none !important; }

/* ============================================================
   LOBBY
   ============================================================ */
#lobby {
  max-width: 520px;
  margin: 40px auto;
  padding: 30px;
  background: var(--panel-bg);
  border-radius: 16px;
  border: 2px solid var(--panel-border);
  text-align: center;
  backdrop-filter: blur(8px);
}

#lobby h2 {
  font-size: 1.8em;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #f1c40f, #e74c3c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#lobby .lobby-section {
  margin: 16px 0;
  padding: 16px;
  background: var(--captured-bg);
  border-radius: 10px;
}

#lobby .lobby-section h3 {
  margin-bottom: 10px;
  font-size: 1em;
}

#lobby input {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid var(--panel-border);
  background: var(--panel-bg);
  color: var(--text-color);
  font-size: 0.9em;
  width: 100%;
  max-width: 250px;
  margin: 4px;
}

#lobby .btn { margin: 4px; }

/* === AI DIFFICULTY SELECTOR === */
.difficulty-selector {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 10px 0;
}

.difficulty-selector input[type="radio"] { display: none; }

.difficulty-selector label {
  padding: 6px 16px;
  border-radius: 20px;
  border: 2px solid var(--panel-border);
  background: var(--panel-bg);
  color: var(--text-color);
  font-size: 0.82em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.difficulty-selector input[type="radio"]:checked + label,
.difficulty-selector label:hover {
  border-color: var(--accent);
  background: rgba(241,196,15,0.15);
  color: var(--accent);
}

.difficulty-selector input[type="radio"]:checked + label {
  background: rgba(241,196,15,0.25);
  box-shadow: 0 0 8px rgba(241,196,15,0.3);
}

/* === SOUND / THEME SELECTORS === */
.sound-selector,
.theme-selector {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 8px 0;
}

.sound-selector input[type="radio"],
.theme-selector input[type="radio"] { display: none; }

.sound-selector label,
.theme-selector label {
  padding: 5px 14px;
  border-radius: 20px;
  border: 2px solid var(--panel-border);
  background: var(--panel-bg);
  color: var(--text-color);
  font-size: 0.8em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.sound-selector input[type="radio"]:checked + label,
.sound-selector label:hover,
.theme-selector input[type="radio"]:checked + label,
.theme-selector label:hover {
  border-color: var(--info);
  background: rgba(52,152,219,0.15);
  color: var(--info);
}

/* === ROOM LIST === */
#room-list {
  margin-top: 12px;
  text-align: left;
  max-height: 200px;
  overflow-y: auto;
}

.room-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--panel-bg);
  border-radius: 6px;
  margin-bottom: 4px;
  border: 1px solid var(--panel-border);
}

/* ============================================================
   CHAT
   ============================================================ */
#chat-panel {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 280px;
  max-height: 300px;
  background: var(--panel-bg);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  border: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  z-index: 500;
  overflow: hidden;
}

#chat-panel.minimized { max-height: 36px; }

#chat-header {
  padding: 8px 12px;
  background: var(--captured-bg);
  cursor: pointer;
  font-size: 0.8em;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  max-height: 200px;
  font-size: 0.8em;
}

.chat-msg {

<script>
// ============================================================
// 맞고 고스톱 v7 - Part 1: Card Data, Utilities, Managers, Menu
// ============================================================

// === CARD DATA ===
const MONTH_NAMES = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MONTH_FLOWERS = ['','🌸','🐦','🌺','🦅','🌿','🦋','🍂','🌕','🏵️','🍁','🌧️','🌳'];

const ALL_CARDS = [];

const CARD_DATA = {
  1:  [{type:'gwang',icon:'🌞',name:'송학'},{type:'tti',icon:'🎀',name:'홍단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  2:  [{type:'dan',icon:'🐦',name:'매조'},{type:'tti',icon:'🎀',name:'홍단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  3:  [{type:'gwang',icon:'🌞',name:'벚꽃'},{type:'tti',icon:'🎀',name:'홍단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  4:  [{type:'dan',icon:'🐦',name:'흑싸리'},{type:'tti',icon:'🟦',name:'초단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  5:  [{type:'dan',icon:'🐦',name:'난초'},{type:'tti',icon:'🟦',name:'초단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  6:  [{type:'dan',icon:'🦋',name:'목단'},{type:'tti',icon:'🟦',name:'초단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  7:  [{type:'dan',icon:'🐗',name:'홍싸리'},{type:'tti',icon:'🟥',name:'청단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  8:  [{type:'gwang',icon:'🌕',name:'공산'},{type:'dan',icon:'🦢',name:'기러기'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  9:  [{type:'dan',icon:'🍶',name:'국진'},{type:'tti',icon:'🟥',name:'청단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  10: [{type:'dan',icon:'🦌',name:'단풍'},{type:'tti',icon:'🟥',name:'청단'},{type:'pi',icon:'·',name:'피'},{type:'pi',icon:'·',name:'피'}],
  11: [{type:'gwang',icon:'🌞',name:'오동'},{type:'dan',icon:'🐦',name:'봉황'},{type:'pi',icon:'·',name:'피'},{type:'ssang-pi',icon:'··',name:'쌍피'}],
  12: [{type:'gwang',icon:'🌞',name:'비광'},{type:'dan',icon:'🐦',name:'제비'},{type:'pi',icon:'·',name:'피'},{type:'ssang-pi',icon:'··',name:'쌍피'}],
};

let cardId = 0;
for (let month = 1; month <= 12; month++) {
  CARD_DATA[month].forEach((cd) => {
    ALL_CARDS.push({
      id: cardId++,
      month: month,
      type: cd.type,
      icon: cd.icon,
      name: cd.name,
      flower: MONTH_FLOWERS[month],
      monthName: MONTH_NAMES[month],
    });
  });
}

// === UTILITY ===
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// === SOUND MANAGER ===
class SoundManager {
  constructor() {
    this.enabled = true;
    this.volume = 0.5;
    this.sounds = {};
    this.ctx = null;
    this.soundTheme = 'casual';
  }

  getContext() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return this.ctx;
  }

  setTheme(theme) {
    this.soundTheme = theme;
  }

  // Generate sounds procedurally (no external URLs needed)
  playTone(freq, duration, type = 'sine', vol = 0.3) {
    if (!this.enabled) return;
    const ctx = this.getContext();
    if (!ctx) return;
    try {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = vol * this.volume;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }

  cardPlace() {
    if (this.soundTheme === 'traditional') {
      this.playTone(400, 0.15, 'triangle', 0.2);
    } else {
      this.playTone(800, 0.1, 'sine', 0.2);
    }
  }

  cardFlip() {
    if (this.soundTheme === 'traditional') {
      this.playTone(300, 0.12, 'sine', 0.15);
    } else {
      this.playTone(600, 0.08, 'triangle', 0.15);
    }
  }

  capture() {
    if (this.soundTheme === 'traditional') {
      this.playTone(600, 0.15, 'sine', 0.25);
      setTimeout(() => this.playTone(800, 0.1, 'sine', 0.2), 80);
    } else {
      this.playTone(1200, 0.15, 'sine', 0.25);
      setTimeout(() => this.playTone(1500, 0.1, 'sine', 0.2), 80);
    }
  }

  bomb() {
    if (this.soundTheme === 'traditional') {
      this.playTone(150, 0.4, 'square', 0.4);
      setTimeout(() => this.playTone(80, 0.3, 'square', 0.3), 150);
    } else {
      this.playTone(200, 0.4, 'sawtooth', 0.4);
      setTimeout(() => this.playTone(100, 0.3, 'square', 0.3), 150);
    }
  }

  win() { [0,100,200,300].forEach((d,i) => setTimeout(() => this.playTone(523 + i*100, 0.3, 'sine', 0.3), d)); }
  lose() { this.playTone(200, 0.5, 'sawtooth', 0.2); }
  button() { this.playTone(1000, 0.05, 'sine', 0.15); }
  go() { this.playTone(880, 0.2, 'triangle', 0.3); setTimeout(() => this.playTone(1100, 0.3, 'triangle', 0.3), 150); }
  notification() { this.playTone(660, 0.15, 'sine', 0.2); }
  chat() { this.playTone(1400, 0.05, 'sine', 0.1); }

  toggle() {
    this.enabled = !this.enabled;
    return this.enabled;
  }

  setVolume(vol) {
    this.volume = Math.max(0, Math.min(1, vol));
  }
}

const soundManager = new SoundManager();

function updateSoundBtn() {
  const btn1 = document.getElementById('sound-toggle-btn');
  const btn2 = document.getElementById('game-sound-btn');
  const text = soundManager.enabled ? '🔊 소리 ON' : '🔇 소리 OFF';
  const short = soundManager.enabled ? '🔊' : '🔇';
  if (btn1) btn1.textContent = text;
  if (btn2) btn2.textContent = short;
}

function toggleSoundGlobal() {
  soundManager.toggle();
  soundManager.button();
  updateSoundBtn();
}

// === CARD THEME SUPPORT ===
let currentCardTheme = 'emoji'; // 'classic', 'simple', 'emoji'
function setCardTheme(theme) { currentCardTheme = theme; if(game) game.render(); }
function setSoundTheme(theme) { soundManager.setTheme(theme); }

// === AI DIFFICULTY ===
let aiDifficulty = 'medium'; // 'easy', 'medium', 'hard'

// === STATISTICS ===
class Statistics {
  constructor() { this.load(); }

  load() {
    const data = localStorage.getItem('gostop_stats');
    this.stats = data ? JSON.parse(data) : {
      gamesPlayed: 0, wins: 0, totalScore: 0, highestScore: 0,
      bombs: 0, ppuks: 0, heundeulgis: 0, chongtongs: 0,
      goCount: 0, multiplayerWins: 0, multiplayerGames: 0
    };
  }

  save() { localStorage.setItem('gostop_stats', JSON.stringify(this.stats)); }

  recordGame(won, score, specialMoves, isMultiplayer) {
    this.stats.gamesPlayed++;
    if (won) this.stats.wins++;
    this.stats.totalScore += score;
    this.stats.highestScore = Math.max(this.stats.highestScore, score);
    if (specialMoves.bomb) this.stats.bombs += specialMoves.bomb;
    if (specialMoves.ppuk) this.stats.ppuks += specialMoves.ppuk;
    if (specialMoves.heundeulgi) this.stats.heundeulgis++;
    if (specialMoves.chongtong) this.stats.chongtongs++;
    if (specialMoves.goCount) this.stats.goCount += specialMoves.goCount;
    if (isMultiplayer) {
      this.stats.multiplayerGames++;
      if (won) this.stats.multiplayerWins++;
    }
    this.save();
  }

  getWinRate() {
    return this.stats.gamesPlayed > 0
      ? Math.round(this.stats.wins / this.stats.gamesPlayed * 100)
      : 0;
  }

  getAverageScore() {
    return this.stats.gamesPlayed > 0
      ? Math.round(this.stats.totalScore / this.stats.gamesPlayed)
      : 0;
  }
}

const statistics = new Statistics();

function showStats() {
  const s = statistics.stats;
  const wr = statistics.getWinRate();
  const avg = statistics.getAverageScore();
  const html = `
    <div id="stats-overlay" onclick="if(event.target===this)this.remove()">
      <div id="stats-content">
        <h2>📊 통계</h2>
        <div class="stats-grid">
          <div class="stats-item"><div class="label">총 게임</div><div class="value">${s.gamesPlayed}</div></div>
          <div class="stats-item"><div class="label">승률</div><div class="value">${wr}%</div></div>

// === SAVE MANAGER ===
class SaveManager {
  static save(game) {
    const data = {
      version: '4.0',
      timestamp: Date.now(),
      deck: game.deck.map(c => c.id),
      floor: game.floor.map(c => c.id),
      ppukStacks: game.ppukStacks,
      players: game.players.map(p => ({
        hand: p.hand.map(c => c.id),
        captured: {
          gwang: p.captured.gwang.map(c => c.id),
          tti: p.captured.tti.map(c => c.id),
          dan: p.captured.dan.map(c => c.id),
          pi: p.captured.pi.map(c => c.id),
        },
        goCount: p.goCount,
        score: p.score,
        heundeulgi: p.heundeulgi,
        heundeulgiMonths: p.heundeulgiMonths,
        ppukCount: p.ppukCount,
        bombs: p.bombs,
      })),
      currentPlayer: game.currentPlayer,
      turnCount: game.turnCount,
    };
    localStorage.setItem('gostop_save', JSON.stringify(data));
    return true;
  }

  static load() {
    const raw = localStorage.getItem('gostop_save');
    if (!raw) return null;
    try {
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }

  static restoreCards(ids) {
    return ids.map(id => ALL_CARDS[id]);
  }

  static hasSave() {
    return !!localStorage.getItem('gostop_save');
  }

  static deleteSave() {
    localStorage.removeItem('gostop_save');
  }
}

function saveCurrentGame() {
  if (!game) return;
  if (SaveManager.save(game)) {
    soundManager.button();
    NotificationManager.show('💾 저장 완료!', '', 'success', 800);
  }
}

function loadSavedGame() {
  const data = SaveManager.load();
  if (!data) {
    alert('저장된 게임이 없습니다.');
    return;
  }
  startSinglePlayer();
  game.restoreFromSave(data);
}

const NotificationManager = {
  queue: [],
  showing: false,

  async show(text, sub, type, duration = 1200) {
    this.queue.push({ text, sub, type, duration });
    if (!this.showing) this._next();
  },

  async _next() {
    if (this.queue.length === 0) { this.showing = false; return; }
    this.showing = true;
    const { text, sub, type, duration } = this.queue.shift();
    const overlay = document.getElementById('notification');
    const box = document.getElementById('notification-box');
    const textEl = document.getElementById('notification-text');
    const subEl = document.getElementById('notification-sub');

    textEl.textContent = text;
    subEl.textContent = sub || '';
    box.className = 'notification-box ' + (type || '');
    overlay.classList.add('show');
    soundManager.notification();

    await delay(duration);
    overlay.classList.remove('show');
    await delay(300);
    this._next();
  },

  showBomb() { soundManager.bomb(); return this.show('💣 폭탄!', '4장 모두 획득 + 피 1장', 'danger'); },

// === MULTIPLAYER CLIENT ===
class MultiplayerClient {
  constructor() {
    this.ws = null;
    this.roomId = null;
    this.isHost = false;
    this.playerIndex = -1;
    this.playerName = '';
    this.connected = false;
  }

  connect(serverUrl) {
    return new Promise((resolve, reject) => {
      try {
        this.ws = new WebSocket(serverUrl);
      } catch(e) {
        reject(e);
        return;
      }

      this.ws.onopen = () => {
        this.connected = true;
        resolve();
      };

      this.ws.onerror = () => {
        reject(new Error('연결 실패'));
      };

      this.ws.onmessage = (e) => {
        try { this.handleMessage(JSON.parse(e.data)); } catch(err) {}
      };

      this.ws.onclose = () => {
        this.connected = false;
        if (game && game.isMultiplayer && !game.gameOver) {
          NotificationManager.show('⚠️ 연결 끊김', '상대방과의 연결이 끊어졌습니다.', 'danger', 2000);
        }
      };
    });
  }

  send(msg) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify(msg));
    }
  }

  createRoom(playerName, password) {
    this.isHost = true;
    this.playerName = playerName;
    this.send({ type: 'create_room', playerName, password });
  }

  joinRoom(roomId, playerName, password) {
    this.playerName = playerName;
    this.send({ type: 'join_room', roomId, playerName, password });
  }

  handleMessage(msg) {
    switch(msg.type) {
      case 'room_created':
        this.roomId = msg.roomId;
        this.playerIndex = msg.playerIndex;
        this.showWaitingRoom(msg.roomId);
        break;
      case 'game_start':
        this.playerIndex = msg.playerIndex;
        this.roomId = msg.roomId;
        this.startMultiplayerGame(msg);
        break;
      case 'join_failed':
        alert(msg.reason);
        break;
      case 'play_card':
      case 'draw_result':
      case 'go_stop':
      case 'match_choice':
      case 'bomb_action':
      case 'heundeulgi':
      case 'game_state':
        if (game && game.isMultiplayer) {
          game.handleRemoteAction(msg);
        }
        break;
      case 'opponent_disconnected':
        NotificationManager.show('⚠️ 상대방 나감', `${msg.name}님이 나갔습니다.`, 'danger', 2000);
        break;
      case 'chat':
        this.displayChat(msg);
        break;
      case 'new_game_request':
        if (confirm(`${msg.from}님이 새 게임을 요청했습니다. 수락하시겠습니까?`)) {
          if (game) game.newGame();
        }
        break;
    }
  }

  showWaitingRoom(roomId) {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('game-screen').classList.add('hidden');

    const modal = document.getElementById('modal-container');
    modal.innerHTML = `
      <div class="modal-overlay">
        <div class="modal" id="waiting-room">
          <h2>🎮 방 생성 완료!</h2>
          <p>아래 코드를 상대방에게 공유하세요</p>
          <div class="room-code">${roomId}</div>
          <p class="waiting-dots">상대방 대기 중</p>
          <button class="btn btn-warning" onclick="mpClient.cancelRoom()">취소</button>
        </div>
      </div>`;
  }

  cancelRoom() {
    if (this.ws) this.ws.close();
    document.getElementById('modal-container').innerHTML = '';
    document.getElementById('main-menu').classList.remove('hidden');
  }

  startMultiplayerGame(msg) {
    document.getElementById('modal-container').innerHTML = '';
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('chat-panel').classList.remove('hidden');

    const names = msg.playerNames || ['Player 1', 'Player 2'];
    const opponentName = names[1 - this.playerIndex] || '상대방';
    document.getElementById('opponent-name-display').textContent = `🎮 ${opponentName}`;

    game = new GoStopGame(true, this.playerIndex, this.isHost);
    window.game = game;
  }

  displayChat(msg) {
    soundManager.chat();
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML = `<span class="sender">${this.escapeHtml(msg.sender)}:</span> ${this.escapeHtml(msg.text)}`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;

    // Auto-expand chat
    document.getElementById('chat-panel').classList.remove('minimized');
  }

  escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  disconnect() {
    if (this.ws) {
      this.ws.close();
      this.ws = null;
    }
    this.connected = false;
    this.roomId = null;
    document.getElementById('chat-panel').classList.add('hidden');
  }
}

// === MAIN GAME ===
class GoStopGame {
  constructor(isMultiplayer = false, myPlayerIndex = 0, isHost = true) {
    this.themeManager = themeManager;
    this.isMultiplayer = isMultiplayer;
    this.myPlayerIndex = myPlayerIndex;
    this.isHost = isHost;
    this.newGame();
  }

  toggleTheme() { this.themeManager.toggle(); }

  newGame() {
    this.deck = shuffle([...ALL_CARDS]);
    this.floor = [];
    this.ppukStacks = {};
    this.players = [
      { name: '나', hand: [], captured: { gwang:[], tti:[], dan:[], pi:[] }, goCount: 0, score: 0, heundeulgi: false, heundeulgiMonths: [], ppukCount: 0, bombs: 0 },
      { name: this.isMultiplayer ? '상대' : 'CPU', hand: [], captured: { gwang:[], tti:[], dan:[], pi:[] }, goCount: 0, score: 0, heundeulgi: false, heundeulgiMonths: [], ppukCount: 0, bombs: 0 },
    ];
    this.currentPlayer = 0;
    this.turnCount = 0;
    this.gameOver = false;
    this.waitingForInput = false;
    this.phase = 'deal';
    this.pendingCapture = null;

    this.deal();
  }

  deal() {
    for (let i = 0; i < 10; i++) {
      this.players[0].hand.push(this.deck.pop());
      this.players[1].hand.push(this.deck.pop());
    }
    for (let i = 0; i < 8; i++) {
      this.floor.push(this.deck.pop());
    }

    this.players[0].hand.sort((a, b) => a.month - b.month || a.id - b.id);
    this.players[1].hand.sort((a, b) => a.month - b.month || a.id - b.id);

    // In multiplayer, host sends game state
    if (this.isMultiplayer && this.isHost) {
      mpClient.send({
        type: 'game_state',
        action: 'init',
        deck: this.deck.map(c => c.id),
        floor: this.floor.map(c => c.id),
        p0hand: this.players[0].hand.map(c => c.id),
        p1hand: this.players[1].hand.map(c => c.id),
      });
    }

    this.render();
    this.checkInitialSpecials();
  }

  restoreFromSave(data) {
    this.deck = SaveManager.restoreCards(data.deck);
    this.floor = SaveManager.restoreCards(data.floor);
    this.ppukStacks = data.ppukStacks || {};
    this.turnCount = data.turnCount || 0;
    this.currentPlayer = data.currentPlayer || 0;
    this.gameOver = false;

    data.players.forEach((pd, i) => {
      this.players[i].hand = SaveManager.restoreCards(pd.hand);
      this.players[i].captured = {
        gwang: SaveManager.restoreCards(pd.captured.gwang),
        tti: SaveManager.restoreCards(pd.captured.tti),
        dan: SaveManager.restoreCards(pd.captured.dan),
        pi: SaveManager.restoreCards(pd.captured.pi),
      };
      this.players[i].goCount = pd.goCount;
      this.players[i].score = pd.score;
      this.players[i].heundeulgi = pd.heundeulgi;
      this.players[i].heundeulgiMonths = pd.heundeulgiMonths;
      this.players[i].ppukCount = pd.ppukCount;
      this.players[i].bombs = pd.bombs;
    });

    this.phase = 'play';
    this.render();
    NotificationManager.show('💾 불러오기 완료!', '', 'success', 800);

    if (this.currentPlayer === 1) {
      setTimeout(() => this.cpuPlay(), 800);
    } else {
      this.checkPlayerBomb();
    }
  }

  handleRemoteAction(msg) {
    // Handle actions from remote player in multiplayer
    switch(msg.type) {
      case 'game_state':
        if (msg.action === 'init' && !this.isHost) {
          this.deck = SaveManager.restoreCards(msg.deck);
          this.floor = SaveManager.restoreCards(msg.floor);
          this.players[0].hand = SaveManager.restoreCards(msg.p0hand);
          this.players[1].hand = SaveManager.restoreCards(msg.p1hand);
          // Swap perspective for non-host
          if (this.myPlayerIndex === 1) {
            const tmp = this.players[0];
            this.players[0] = this.players[1];
            this.players[1] = tmp;
          }
          this.players[0].hand.sort((a, b) => a.month - b.month || a.id - b.id);
          this.players[1].hand.sort((a, b) => a.month - b.month || a.id - b.id);
          this.render();
          this.checkInitialSpecials();
        }
        break;
      case 'play_card':
        // Opponent played a card - execute it
        this.executePlayRemote(msg.cardId);
        break;
    }
  }

  async executePlayRemote(cardId) {
    const card = this.players[1].hand.find(c => c.id === cardId);
    if (!card) return;
    await this.executePlay(1, card);
  }

  async checkInitialSpecials() {
    for (let p = 0; p < 2; p++) {
      const hand = this.players[p].hand;
      for (let m = 1; m <= 12; m++) {
        if (hand.filter(c => c.month === m).length === 4) {
          await NotificationManager.showChongtong();
          this.players[p].score = 10;
          this.endGame(p, '총통');
          return;
        }
      }
    }

    const playerHand = this.players[0].hand;
    const heundeulgiMonths = [];
    for (let m = 1; m <= 12; m++) {
      if (playerHand.filter(c => c.month === m).length >= 3) {
        heundeulgiMonths.push(m);
      }
    }
    if (heundeulgiMonths.length > 0) {
      this.showHeundeulgiChoice(heundeulgiMonths);
      return;
    }

    if (!this.isMultiplayer) this.checkCpuHeundeulgi();
    this.phase = 'play';
    this.startTurn();
  }

  // === ENHANCED CPU HEUNDEULGI (v7) ===
  checkCpuHeundeulgi() {
    const cpuHand = this.players[1].hand;
    for (let m = 1; m <= 12; m++) {
      if (cpuHand.filter(c => c.month === m).length >= 3) {
        if (aiDifficulty === 'easy') {
          // Easy AI doesn't use heundeulgi
          continue;
        }
        if (aiDifficulty === 'medium' && Math.random() < 0.5) {
          continue; // 50% chance to skip
        }
        this.players[1].heundeulgi = true;
        this.players[1].heundeulgiMonths.push(m);
      }
    }
    if (this.players[1].heundeulgi) {
      NotificationManager.show('🤖 흔들기!', 'CPU가 흔들기 선언', 'info');
    }
  }

  showHeundeulgiChoice(months) {
    const monthNames = months.map(m => `${MONTH_NAMES[m]}(${MONTH_FLOWERS[m]})`).join(', ');
    const modal = document.getElementById('modal-container');
    modal.innerHTML = `
      <div class="modal-overlay">
        <div class="modal">
          <h2>👋 흔들기</h2>
          <p>${monthNames} - 같은 월 3장 보유!<br>흔들기를 선언하시겠습니까?<br>(승리시 점수 2배)</p>
          <button class="btn btn-success" onclick="game.declareHeundeulgi(${JSON.stringify(months)})">흔들기!</button>
          <button class="btn btn-secondary" onclick="game.declineHeundeulgi()">안함</button>
        </div>
      </div>`;
  }

  declareHeundeulgi(months) {
    this.players[0].heundeulgi = true;
    this.players[0].heundeulgiMonths = months;
    document.getElementById('modal-container').innerHTML = '';
    NotificationManager.showHeundeulgi();

    if (this.isMultiplayer) {
      mpClient.send({ type: 'heundeulgi', months });
    }

    setTimeout(() => {
      document.querySelectorAll('#player-hand .card').forEach(el => {
        const cardMonth = parseInt(el.dataset.month);
        if (months.includes(cardMonth)) {
          el.classList.add('shake-anim');
          setTimeout(() => el.classList.remove('shake-anim'), 500);
        }
      });
    }, 100);

    if (!this.isMultiplayer) this.checkCpuHeundeulgi();
    this.phase = 'play';
    this.render();
    this.startTurn();
  }

  declineHeundeulgi() {
    document.getElementById('modal-container').innerHTML = '';
    if (!this.isMultiplayer) this.checkCpuHeundeulgi();
    this.phase = 'play';
    this.render();
    this.startTurn();
  }

  // === TURN LOGIC ===
  startTurn() {
    if (this.gameOver) return;
    this.turnCount++;
    this.render();

    if (this.currentPlayer === 1) {
      if (this.isMultiplayer) {
        // Wait for remote player
        this.waitingForInput = false;
        this.render();
      } else {
        setTimeout(() => this.cpuPlay(), 800);
      }
    } else {
      this.checkPlayerBomb();
    }
  }

  checkPlayerBomb() {
    const hand = this.players[0].hand;
    const bombMonths = [];
    for (let m = 1; m <= 12; m++) {
      const inHand = hand.filter(c => c.month === m).length;
      const onFloor = this.floor.filter(c => c.month === m).length;
      if (inHand >= 3 && onFloor >= 1) {
        bombMonths.push(m);
      }
    }

    if (bombMonths.length > 0) {
      this.showBombChoice(bombMonths);
    } else {
      this.waitingForInput = true;
      this.render();
    }
  }

  showBombChoice(months) {
    const btns = document.getElementById('action-buttons');
    let html = '<span style="font-size:0.8em;opacity:0.7">폭탄 가능: </span>';
    months.forEach(m => {
      html += `<button class="btn btn-warning btn-small" onclick="game.executeBomb(${m})">💣 ${MONTH_NAMES[m]}</button>`;
    });
    html += `<button class="btn btn-secondary btn-small" onclick="game.skipBomb()">패스</button>`;
    btns.innerHTML = html;
    this.waitingForInput = true;
    this.render();
  }

  async executeBomb(month) {
    const p = this.players[this.currentPlayer];
    const handCards = p.hand.filter(c => c.month === month);
    const floorCards = this.floor.filter(c => c.month === month);
    const allCards = [...handCards, ...floorCards];

    p.hand = p.hand.filter(c => c.month !== month);
    this.floor = this.floor.filter(c => c.month !== month);

    allCards.forEach(c => this.captureCard(this.currentPlayer, c));
    p.bombs++;

    this.stealPi(this.currentPlayer, 1 - this.currentPlayer, 1);

    if (this.isMultiplayer) {
      mpClient.send({ type: 'bomb_action', month });
    }

    await NotificationManager.showBomb();
    document.getElementById('action-buttons').innerHTML = '';

    this.render();
    this.waitingForInput = true;
    this.render();
  }

  skipBomb() {
    document.getElementById('action-buttons').innerHTML = '';
    this.waitingForInput = true;
    this.render();
  }

  async playCard(cardId) {
    if (!this.waitingForInput || this.currentPlayer !== 0) return;
    this.waitingForInput = false;

    const card = this.players[0].hand.find(c => c.id === cardId);
    if (!card) return;

    soundManager.cardPlace();

    if (this.isMultiplayer) {
      mpClient.send({ type: 'play_card', cardId: card.id });
    }

    await this.executePlay(0, card);
  }

  async executePlay(playerIdx, card) {
    const player = this.players[playerIdx];
    player.hand = player.hand.filter(c => c.id !== card.id);

    const matches = this.floor.filter(c => c.month === card.month);

    if (matches.length === 0) {
      this.floor.push(card);
      this.render();
      await delay(400);
      await this.drawFromDeck(playerIdx);
    } else if (matches.length === 1) {
      this.floor = this.floor.filter(c => c.id !== matches[0].id);
      this.pendingCapture = [card, matches[0]];
      soundManager.capture();
      this.render();
      await delay(400);
      await this.drawFromDeck(playerIdx);
    } else if (matches.length === 2) {
      if (playerIdx === 0 && !this.isMultiplayer || (this.isMultiplayer && playerIdx === 0)) {
        this.showMatchChoice(card, matches);
        return;
      } else {
        const pick = matches[0];
        this.floor = this.floor.filter(c => c.id !== pick.id);
        this.pendingCapture = [card, pick];
        this.render();
        await delay(400);
        await this.drawFromDeck(playerIdx);
      }
    } else if (matches.length === 3) {
      const ppukKey = card.month;
      if (this.ppukStacks[ppukKey]) {
        const ppukCreator = this.ppukStacks[ppukKey].creator;
        if (ppukCreator === playerIdx) {
          await NotificationManager.showJabppuk();
          this.stealPi(1 - playerIdx, playerIdx, 2);
        }
        delete this.ppukStacks[ppukKey];
      }
      const all = this.floor.filter(c => c.month === card.month);
      this.floor = this.floor.filter(c => c.month !== card.month);
      this.pendingCapture = [card, ...all];
      soundManager.capture();
      this.render();
      await delay(400);
      await this.drawFromDeck(playerIdx);
    }
  }

  showMatchChoice(playedCard, matches) {
    const modal = document.getElementById('modal-container');
    let html = `<div class="modal-overlay"><div class="modal"><h2>카드 선택</h2><p>${MONTH_NAMES[playedCard.month]} 중 가져갈 카드를 선택하세요</p><div class="match-options">`;
    matches.forEach(m => {
      html += `<div class="match-option" onclick="game.selectMatch(${playedCard.id}, ${m.id})">${m.icon} ${m.name}</div>`;
    });
    html += `</div></div></div>`;
    modal.innerHTML = html;
  }

  async selectMatch(playedCardId, matchCardId) {
    document.getElementById('modal-container').innerHTML = '';
    const playedCard = ALL_CARDS.find(c => c.id === playedCardId);
    const matchCard = this.floor.find(c => c.id === matchCardId);
    this.floor = this.floor.filter(c => c.id !== matchCardId);
    this.pendingCapture = [playedCard, matchCard];
    soundManager.capture();

    if (this.isMultiplayer) {
      mpClient.send({ type: 'match_choice', playedCardId, matchCardId });
    }

    this.render();
    await delay(400);
    await this.drawFromDeck(0);
  }

  async drawFromDeck(playerIdx) {
    if (this.deck.length === 0) {
      if (this.pendingCapture) {
        this.pendingCapture.forEach(c => this.captureCard(playerIdx, c));
        this.pendingCapture = null;
      }
      this.render();
      this.checkEndOfGame();
      return;
    }

    const drawn = this.deck.pop();
    soundManager.cardFlip();
    const drawnMatches = this.floor.filter(c => c.month === drawn.month);

    if (drawnMatches.length === 0) {
      this.floor.push(drawn);
      if (this.pendingCapture) {
        this.pendingCapture.forEach(c => this.captureCard(playerIdx, c));
        this.pendingCapture = null;
      }
    } else if (drawnMatches.length === 1) {
      this.floor = this.floor.filter(c => c.id !== drawnMatches[0].id);
      if (this.pendingCapture) {
        this.pendingCapture.forEach(c => this.captureCard(playerIdx, c));
        this.pendingCapture = null;
      }
      this.captureCard(playerIdx, drawn);
      this.captureCard(playerIdx, drawnMatches[0]);
      soundManager.capture();
    } else if (drawnMatches.length === 2) {
      this.floor.push(drawn);
      this.players[playerIdx].ppukCount++;
      const ppukCount = this.players[playerIdx].ppukCount;

      this.ppukStacks[drawn.month] = { creator: playerIdx, count: 3 };

      if (this.turnCount <= 1 && ppukCount === 1) {
        await NotificationManager.showFirstPpuk();
      }

      await NotificationManager.showPpuk(ppukCount);

      if (ppukCount >= 3) {
        await NotificationManager.show('💥 삼연뻑!', '게임 즉시 종료!', 'danger', 1500);
        this.players[playerIdx].score = 7;
        if (this.pendingCapture) {
          this.pendingCapture.forEach(c => this.captureCard(playerIdx, c));
          this.pendingCapture = null;
        }
        this.endGame(playerIdx, '삼연뻑');
        return;
      }

      if (this.pendingCapture) {
        this.pendingCapture.forEach(c => this.captureCard(playerIdx, c));
        this.pendingCapture = null;
      }
    } else if (drawnMatches.length === 3) {
      const all = this.floor.filter(c => c.month === drawn.month);
      this.floor = this.floor.filter(c => c.month !== drawn.month);
      if (this.pendingCapture) {
        this.pendingCapture.forEach(c => this.captureCard(playerIdx, c));
        this.pendingCapture = null;
      }
      [drawn, ...all].forEach(c => this.captureCard(playerIdx, c));
      soundManager.capture();

      if (this.ppukStacks[drawn.month]) {
        const ppukCreator = this.ppukStacks[drawn.month].creator;
        if (ppukCreator === playerIdx) {
          await NotificationManager.showJabppuk();
          this.stealPi(1 - playerIdx, playerIdx, 2);
        } else {
          this.stealPi(playerIdx, ppukCreator, 1);
        }
        delete this.ppukStacks[drawn.month];
      }
    }

    this.render();
    await delay(300);

    const score = this.calculateScore(playerIdx);
    if (score >= 7) {
      this.players[playerIdx].score = score;
      await this.showGoStopChoice(playerIdx);
      return;
    }

    this.endTurn();
  }

  captureCard(playerIdx, card) {
    const p = this.players[playerIdx];
    const type = card.type;
    if (type === 'gwang') p.captured.gwang.push(card);
    else if (type === 'tti') p.captured.tti.push(card);
    else if (type === 'dan') p.captured.dan.push(card);
    else if (type === 'pi' || type === 'ssang-pi') p.captured.pi.push(card);
  }

  stealPi(toPlayer, fromPlayer, count) {
    const from = this.players[fromPlayer].captured.pi;
    const stolen = from.splice(0, Math.min(count, from.length));
    this.players[toPlayer].captured.pi.push(...stolen);
  }

  getPiCount(playerIdx) {
    let count = 0;
    this.players[playerIdx].captured.pi.forEach(c => {
      count += c.type === 'ssang-pi' ? 2 : 1;
    });
    return count;
  }

  calculateScore(playerIdx) {
    const p = this.players[playerIdx];
    let score = 0;

    const gwangCount = p.captured.gwang.length;
    const hasBiGwang = p.captured.gwang.some(c => c.month === 12);
    if (gwangCount === 5) score += 15;
    else if (gwangCount === 4) score += 4;
    else if (gwangCount === 3) {
      score += hasBiGwang ? 2 : 3;
    }

    const ttiCount = p.captured.tti.length;
    if (ttiCount >= 5) score += ttiCount - 4;

    const hongdan = p.captured.tti.filter(c => c.icon === '🎀').length >= 3;
    const chodan = p.captured.tti.filter(c => c.icon === '🟦').length >= 3;
    const cheongdan = p.captured.tti.filter(c => c.icon === '🟥').length >= 3;
    if (hongdan) score += 3;
    if (chodan) score += 3;
    if (cheongdan) score += 3;

    const danCount = p.captured.dan.length;
    if (danCount >= 5) score += danCount - 4;

    const piCount = this.getPiCount(playerIdx);
    if (piCount >= 10) score += piCount - 9;

    return score;
  }

  // === ENHANCED GO/STOP CHOICE (v7) ===
  async showGoStopChoice(playerIdx) {
    if (playerIdx === 1 && !this.isMultiplayer) {
      const score = this.calculateScore(1);
      let shouldStop = false;

      if (aiDifficulty === 'easy') {
        shouldStop = score >= 7; // Always stops at minimum
      } else if (aiDifficulty === 'medium') {
        shouldStop = score >= 10 || this.players[1].goCount >= 2;
      } else {
        // Hard: consider opponent's score and risk
        const opponentScore = this.calculateScore(0);
        const goCount = this.players[1].goCount;
        const remainingCards = this.players[1].hand.length;

        if (score >= 12) shouldStop = true;
        else if (goCount >= 3) shouldStop = true;
        else if (score >= 10 && opponentScore >= 5) shouldStop = true;
        else if (score >= 8 && remainingCards <= 2) shouldStop = true;
        else if (goCount >= 2 && opponentScore >= 7) shouldStop = true;
        else shouldStop = false;
      }

      if (shouldStop) {
        this.players[1].score = score;
        this.endGame(1, '스톱');
      } else {
        this.players[1].goCount++;
        await NotificationManager.showGo(this.players[1].goCount);
        this.endTurn();
      }
      return;
    }

    if (this.isMultiplayer && playerIdx === 1) {
      // Wait for remote decision
      return;
    }

    const score = this.calculateScore(0);
    const goCount = this.players[0].goCount;
    const modal = document.getElementById('modal-container');
    modal.innerHTML = `
      <div class="modal-overlay">
        <div class="modal">
          <h2 class="go-pulse">🎯 ${score}점!</h2>
          <p>현재 ${goCount}고 상태<br>고를 외치면 점수가 올라갑니다!</p>
          <button class="btn btn-warning" onclick="game.declareGo()">고! (계속)</button>
          <button class="btn btn-success" onclick="game.declareStop()">스톱! (승리)</button>
        </div>
      </div>`;
  }

  async declareGo() {
    document.getElementById('modal-container').innerHTML = '';
    this.players[0].goCount++;

    if (this.isMultiplayer) {
      mpClient.send({ type: 'go_stop', action: 'go' });
    }

    await NotificationManager.showGo(this.players[0].goCount);
    this.endTurn();
  }

  declareStop() {
    document.getElementById('modal-container').innerHTML = '';
    this.players[0].score = this.calculateScore(0);

    if (this.isMultiplayer) {
      mpClient.send({ type: 'go_stop', action: 'stop' });
    }

    this.endGame(0, '스톱');
  }

  endTurn() {
    if (this.gameOver) return;

    if (this.players[0].hand.length === 0 && this.players[1].hand.length === 0) {
      this.checkEndOfGame();
      return;
    }

    this.currentPlayer = 1 - this.currentPlayer;
    this.startTurn();
  }

  checkEndOfGame() {
    const s0 = this.calculateScore(0);
    const s1 = this.calculateScore(1);
    this.players[0].score = s0;
    this.players[1].score = s1;

    if (s0 > s1) this.endGame(0, '점수');
    else if (s1 > s0) this.endGame(1, '점수');
    else this.endGame(-1, '무승부');
  }

  // === ENHANCED CPU AI (v7) ===
  async cpuPlay() {
    if (this.gameOver) return;
    const cpu = this.players[1];
    if (cpu.hand.length === 0) { this.endTurn(); return; }

    // Check for bomb (all difficulties)
    for (let m = 1; m <= 12; m++) {
      const inHand = cpu.hand.filter(c => c.month === m).length;
      const onFloor = this.floor.filter(c => c.month === m).length;
      if (inHand >= 3 && onFloor >= 1) {
        const handCards = cpu.hand.filter(c => c.month === m);
        const floorCards = this.floor.filter(c => c.month === m);
        cpu.hand = cpu.hand.filter(c => c.month !== m);
        this.floor = this.floor.filter(c => c.month !== m);
        [...handCards, ...floorCards].forEach(c => this.captureCard(1, c));
        cpu.bombs++;
        this.stealPi(1, 0, 1);
        await NotificationManager.showBomb();
        this.render();
        await delay(500);
      }
    }
    if (cpu.hand.length === 0) { this.endTurn(); return; }

    let bestCard = null;

    if (aiDifficulty === 'easy') {
      // Random play
      bestCard = cpu.hand[Math.floor(Math.random() * cpu.hand.length)];
    } else if (aiDifficulty === 'medium') {
      // Basic strategy: prioritize gwang, then matching, consider chongtong
      bestCard = this.cpuMediumStrategy(cpu);
    } else {
      // Hard: advanced strategy with opponent analysis
      bestCard = this.cpuHardStrategy(cpu);
    }

    if (!bestCard) bestCard = cpu.hand[0];
    await this.executePlay(1, bestCard);
  }

  cpuMediumStrategy(cpu) {
    let bestCard = null;
    let bestScore = -1;

    cpu.hand.forEach(card => {
      const matches = this.floor.filter(c => c.month === card.month);
      let score = 0;
      if (matches.length > 0) {
        score += 10;
        matches.forEach(m => {
          if (m.type === 'gwang') score += 30;
          else if (m.type === 'dan') score += 8;
          else if (m.type === 'tti') score += 6;
          else score += 1;
        });
        if (card.type === 'gwang') score += 30;
        else if (card.type === 'dan') score += 8;
        else if (card.type === 'tti') score += 6;
      } else {
        // Penalty for placing valuable cards on floor
        if (card.type === 'gwang') score -= 15;
        else if (card.type === 'dan') score -= 5;
        else if (card.type === 'tti') score -= 3;
      }
      // Consider chongtong potential
      const sameMonth = cpu.hand.filter(c => c.month === card.month).length;
      if (sameMonth >= 3) score += 5;

      if (score > bestScore) {
        bestScore = score;
        bestCard = card;
      }
    });
    return bestCard;
  }

  cpuHardStrategy(cpu) {
    let bestCard = null;
    let bestScore = -Infinity;

    const playerCaptured = this.players[0].captured;
    const playerGwangCount = playerCaptured.gwang.length;
    const playerTtiCount = playerCaptured.tti.length;
    const cpuGwangCount = cpu.captured.gwang.length;
    const cpuTtiCount = cpu.captured.tti.length;

    cpu.hand.forEach(card => {
      const matches = this.floor.filter(c => c.month === card.month);
      let score = 0;

      if (matches.length > 0) {
        score += 15;
        matches.forEach(m => {
          if (m.type === 'gwang') score += 40;
          else if (m.type === 'dan') score += 10;
          else if (m.type === 'tti') {
            score += 8;
            // Check if completing hongdan/chodan/cheongdan set
            const ttiIcon = m.icon;
            const capturedSame = cpu.captured.tti.filter(c => c.icon === ttiIcon).length;
            if (capturedSame >= 2) score += 20; // completing a set!
          }
          else score += 2;
        });
        if (card.type === 'gwang') {
          score += 40;
          if (cpuGwangCount >= 2) score += 30; // getting closer to gwang bonus
        }
        else if (card.type === 'tti') {
          score += 8;
          const sameIcon = cpu.captured.tti.filter(c => c.icon === card.icon).length;
          if (sameIcon >= 2) score += 20;
        }
        else if (card.type === 'dan') score += 10;
      } else {
        // No match - card goes to floor
        if (card.type === 'gwang') score -= 25;
        else if (card.type === 'dan') score -= 8;
        else if (card.type === 'tti') score -= 5;
        else score += 1; // pi cards are OK to place

        // Defensive: don't feed opponent gwang
        if (card.type === 'gwang' && playerGwangCount >= 2) score -= 15;
      }

      // Strategic: avoid creating ppuk situations for opponent
      const floorSameMonth = this.floor.filter(c => c.month === card.month).length;
      if (matches.length === 0 && floorSameMonth === 1) {
        // Creates a pair on floor - potential ppuk risk
        score -= 3;
      }

      // Prefer cards where we hold another of same month (can capture later)
      const sameMonthInHand = cpu.hand.filter(c => c.month === card.month && c.id !== card.id).length;
      if (matches.length === 0 && sameMonthInHand >= 1) {
        score += 5; // we can capture it next turn
      }

      if (score > bestScore) {
        bestScore = score;
        bestCard = card;
      }
    });
    return bestCard;
  }

  // === GAME END ===
  async endGame(winnerIdx, reason) {
    this.gameOver = true;

    if (winnerIdx === -1) {
      this.recordStats(-1, 0, reason);
      this.showGameOver('무승부', 0, 0, {}, reason);
      return;
    }

    const winner = this.players[winnerIdx];
    const loser = this.players[1 - winnerIdx];
    let baseScore = winner.score;
    let multiplier = 1;
    const bonuses = {};

    if (winner.heundeulgi) {
      multiplier *= 2;
      bonuses['흔들기'] = 'x2';
    }

    if (winner.goCount >= 1) {
      const goMult = Math.pow(2, Math.max(0, winner.goCount - 1));
      multiplier *= goMult;
      bonuses[`${winner.goCount}고`] = `x${goMult}`;
    }

    if (winner.bombs > 0) {
      multiplier *= Math.pow(2, winner.bombs);
      bonuses[`폭탄 ${winner.bombs}회`] = `x${Math.pow(2, winner.bombs)}`;
    }

    const loserPi = this.getPiCount(1 - winnerIdx);
    if (loserPi <= 6 && this.getPiCount(winnerIdx) >= 10) {
      multiplier *= 2;
      bonuses['피박'] = 'x2';
      await NotificationManager.showPiBak();
    }

    if (loser.captured.gwang.length === 0 && winner.captured.gwang.length >= 3) {
      multiplier *= 2;
      bonuses['광박'] = 'x2';
      await NotificationManager.showGwangBak();
    }

    if (multiplier > 1) {
      await NotificationManager.showMultiplier(multiplier);
    }

    const finalScore = baseScore * multiplier;
    const winnerName = winnerIdx === 0 ? '나' : (this.isMultiplayer ? '상대' : 'CPU');

    // v7: confetti on win, lose sound otherwise
    if (winnerIdx === 0) { soundManager.win(); launchConfetti(); } else soundManager.lose();

    this.recordStats(winnerIdx, finalScore, reason);
    this.showGameOver(winnerName, baseScore, finalScore, bonuses, reason);
  }

  recordStats(winnerIdx, finalScore, reason) {
    const won = winnerIdx === 0;
    const p = this.players[0];
    statistics.recordGame(won, won ? finalScore : 0, {
      bomb: p.bombs,
      ppuk: p.ppukCount,
      heundeulgi: p.heundeulgi ? 1 : 0,
      chongtong: reason === '총통' && winnerIdx === 0 ? 1 : 0,
      goCount: p.goCount,
    }, this.isMultiplayer);
  }

  showGameOver(winnerName, baseScore, finalScore, bonuses, reason) {
    const modal = document.getElementById('modal-container');
    let bonusHtml = '';
    Object.entries(bonuses).forEach(([k, v]) => {
      bonusHtml += `<div class="score-line"><span>${k}</span><span class="multiplier-badge">${v}</span></div>`;
    });

    modal.innerHTML = `
      <div class="game-over">
        <div class="game-over-content">
          <h2>${winnerName === '무승부' ? '🤝 무승부' : `🏆 ${winnerName} 승리!`}</h2>
          <p style="opacity:0.7">${reason}</p>
          <div class="score-panel">
            <div class="score-breakdown">
              ${baseScore > 0 ? `<div class="score-line"><span>기본 점수</span><span>${baseScore}점</span></div>` : ''}
              ${bonusHtml}
              ${finalScore > 0 ? `<div class="score-line score-total"><span>최종 점수</span><span>${finalScore}점</span></div>` : ''}
            </div>
          </div>
          <br>
          <button class="btn btn-primary" onclick="game.newGame(); document.getElementById('modal-container').innerHTML=''">새 게임</button>
          <button class="btn btn-secondary" onclick="backToMenu()">메뉴로</button>
        </div>
      </div>`;
  }

  // === RENDER ===
  render() {
    document.getElementById('deck-count').textContent = this.deck.length;
    document.getElementById('turn-count').textContent = this.turnCount;
    document.getElementById('turn-info').textContent =
      this.currentPlayer === 0 ? '👤 내 차례' :
      (this.isMultiplayer ? '🎮 상대 차례' : '🤖 CPU 차례');

    document.getElementById('player-area').classList.toggle('active', this.currentPlayer === 0);
    document.getElementById('cpu-area').classList.toggle('active', this.currentPlayer === 1);

    // v7: Score animation with pulse on change
    const pScoreEl = document.getElementById('player-score');
    const cScoreEl = document.getElementById('cpu-score');
    const newPScore = this.calculateScore(0);
    const newCScore = this.calculateScore(1);
    if (pScoreEl.dataset.prev && parseInt(pScoreEl.dataset.prev) !== newPScore) {
      pScoreEl.style.animation = 'none';
      pScoreEl.offsetHeight; // reflow
      pScoreEl.style.animation = 'scorePopup 0.3s ease-out';
    }
    pScoreEl.dataset.prev = newPScore;
    pScoreEl.textContent = newPScore;
    if (cScoreEl.dataset.prev && parseInt(cScoreEl.dataset.prev) !== newCScore) {
      cScoreEl.style.animation = 'none';
      cScoreEl.offsetHeight;
      cScoreEl.style.animation = 'scorePopup 0.3s ease-out';
    }
    cScoreEl.dataset.prev = newCScore;
    cScoreEl.textContent = newCScore;

    document.getElementById('player-go').textContent = this.players[0].goCount;
    document.getElementById('cpu-go').textContent = this.players[1].goCount;

    const badge = document.getElementById('player-heundeulgi-badge');
    badge.innerHTML = this.players[0].heundeulgi ?
      '<span class="heundeulgi-indicator">👋 흔들기</span>' : '';

    this.renderHand(0);
    this.renderCpuHand();
    this.renderFloor();
    this.renderCaptured(0);
    this.renderCaptured(1);
  }

  renderHand(playerIdx) {
    const el = document.getElementById('player-hand');
    el.innerHTML = '';
    this.players[playerIdx].hand.forEach(card => {
      const div = this.createCardEl(card, false);
      if (this.waitingForInput && this.currentPlayer === 0) {
        div.onclick = () => this.playCard(card.id);
      } else {
        div.classList.add('disabled');
      }
      el.appendChild(div);
    });
  }

  renderCpuHand() {
    const el = document.getElementById('cpu-hand');
    el.innerHTML = '';
    this.players[1].hand.forEach(() => {
      const div = document.createElement('div');
      div.className = 'card face-down';
      el.appendChild(div);
    });
  }

  renderFloor() {
    const el = document.getElementById('floor-cards');
    el.innerHTML = '';

    const groups = {};
    this.floor.forEach(c => {
      if (!groups[c.month]) groups[c.month] = [];
      groups[c.month].push(c);
    });

    Object.keys(groups).sort((a, b) => a - b).forEach(month => {
      groups[month].forEach(card => {
        const div = this.createCardEl(card, false);
        div.style.cursor = 'default';

        if (this.ppukStacks[card.month]) {
          const marker = document.createElement('div');
          marker.className = 'ppuk-marker';
          marker.textContent = '뻑';
          div.appendChild(marker);
        }

        el.appendChild(div);
      });
    });
  }

  renderCaptured(playerIdx) {
    const prefix = playerIdx === 0 ? 'player' : 'cpu';
    const p = this.players[playerIdx];

    ['gwang', 'tti', 'dan', 'pi'].forEach(type => {
      const el = document.getElementById(`${prefix}-${type}`);
      el.innerHTML = '';
      p.captured[type].forEach(card => {
        const div = this.createCardEl(card, true);
        el.appendChild(div);
      });
    });
  }

  // === ENHANCED CARD RENDERING WITH IMAGE SUPPORT (v7) ===
  createCardEl(card, small) {
    const div = document.createElement('div');
    div.className = `card ${card.type} ${small ? 'small' : ''} slide-in`;
    div.dataset.month = card.month;
    div.dataset.id = card.id;

    if (currentCardTheme !== 'emoji') {
      // Try to load image
      const cardIndex = ALL_CARDS.filter(c => c.month === card.month).indexOf(
        ALL_CARDS.find(c => c.id === card.id)
      );
      const mm = String(card.month).padStart(2, '0');
      const n = cardIndex + 1;
      const imgSrc = `assets/cards/${currentCardTheme}/${mm}_${n}.png`;

      const img = document.createElement('img');
      img.className = 'card-image';
      img.src = imgSrc;
      img.alt = `${card.monthName} ${card.name}`;
      img.onerror = function() {
        // Fallback to emoji display
        this.remove();
        div.innerHTML = `
          <div class="card-icon">${card.flower}</div>
          <div class="card-month">${card.month}</div>
          <div class="card-type">${card.icon}</div>
        `;
      };
      div.appendChild(img);
    } else {
      div.innerHTML = `
        <div class="card-icon">${card.flower}</div>
        <div class="card-month">${card.month}</div>
        <div class="card-type">${card.icon}</div>
      `;
    }
    return div;
  }
}

// === INIT ===
let game;
document.addEventListener('DOMContentLoaded', () => {
  updateSoundBtn();
});
